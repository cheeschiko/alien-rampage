// ── Updates ─────────────────────────────────────────────
function updateCam(){
  if(lock!=null){
    camX+=(lock-camX)*0.1;
    if(Math.abs(lock-camX)<0.8)camX=lock;
  } else {
    const target=clamp(player.x-W*0.42, minCam, WORLD-W);
    camX+=(target-camX)*0.14;
  }
}

function updatePlayer(){
  const p=player;
  if(p.atkCool>0)p.atkCool--; if(p.hurtTimer>0)p.hurtTimer--;
  if(p.inv>0)p.inv--; if(p.comboTimer>0)p.comboTimer--; else p.comboStep=0;
  if(p.spinCool>0)p.spinCool--;
  if(p.shotCool>0)p.shotCool--;
  if(p.chainTimer>0)p.chainTimer--; else if(!p.attacking)p.chainNext=0;
  if(p.hp<=0){scene=SC.OVER;return;}

  if(!p.attacking&&p.atkCool===0){
    if(jp('f')&&p.shotCool===0){
      p.attacking=true;p.atkType=7;p.atkTimer=0;p.atkCool=8;
      p.shotCool=p.ammo>0?14:75;   // ray gun fires fast
      p.chainNext=0;
    } else if(jp('d')&&p.spinCool===0){
      p.attacking=true;p.atkType=6;p.atkTimer=0;p.atkCool=10;p.spinCool=200;
      p.chainNext=0;
      htAdd(p.x,p.y-132,'회오리!!','#4DD0E1');
    } else if(jp('a')){
      p.attacking=true;
      if(p.comboStep===1&&p.comboTimer>0){
        p.atkType=3;p.comboStep=0;p.comboTimer=0;score+=20;doShake(8,10);
        htAdd(p.x,p.y-132,'COMBO!!','#CE93D8');pAdd(p.x,p.y-50,14,'#CE93D8',1.3);
        p.chainNext=0;
      } else if(p.chainTimer>0&&p.chainNext){
        p.atkType=p.chainNext;
        if(p.atkType===5)htAdd(p.x,p.y-132,'3연타!!','#FFB74D');
        if(p.atkType===8){htAdd(p.x,p.y-132,'피니시!!','#FF5252');doShake(7,8);}
        p.chainNext=p.atkType===4?5:p.atkType===5?8:0;
      } else {p.atkType=1;p.comboStep=0;p.chainNext=4;}
      p.atkTimer=0;p.atkCool=8;
    } else if(jp('s')){
      p.attacking=true;p.atkType=2;p.atkTimer=0;p.atkCool=16;
      p.comboStep=1;p.comboTimer=70;p.chainNext=0;
    }
  }

  if(p.attacking){
    // S → A: cancel the haymaker straight into the combo finisher
    if(p.atkType===2 && p.comboStep===1 && p.atkTimer>=Math.floor(p.atkDur[2]*0.5) && jp('a')){
      p.atkType=3; p.atkTimer=0; p.comboStep=0; p.comboTimer=0; score+=20; doShake(8,10);
      htAdd(p.x,p.y-132,'COMBO!!','#CE93D8'); pAdd(p.x,p.y-50,14,'#CE93D8',1.3);
    }
    // S → S: cancel into the earthquake ground pound
    else if(p.atkType===2 && p.comboStep===1 && p.atkTimer>=Math.floor(p.atkDur[2]*0.5) && jp('s')){
      p.atkType=9; p.atkTimer=0; p.comboStep=0; p.comboTimer=0; doShake(6,8);
      htAdd(p.x,p.y-132,'지진 강타!!','#FF7043'); pAdd(p.x,p.y-50,12,'#FF7043',1.3);
    }
    // A-chain: jab -> cross -> spin kick -> finisher (cancel late frames into the next hit)
    else if((p.atkType===1||p.atkType===4||p.atkType===5) && jp('a') && p.atkTimer>=Math.floor(p.atkDur[p.atkType]*0.55)){
      const nxt=p.atkType===1?4:p.atkType===4?5:8;
      p.atkType=nxt; p.atkTimer=0;
      if(nxt===5)htAdd(p.x,p.y-132,'3연타!!','#FFB74D');
      if(nxt===8){htAdd(p.x,p.y-132,'피니시!!','#FF5252');doShake(7,8);}
      p.chainNext=nxt===4?5:nxt===5?8:0;
    }
    p.atkTimer++;
    const dur=p.atkDur[p.atkType];
    // forward step during the active part of an attack
    const lspd=[0,2.0,2.4,3.0,2.8,2.4,0,1.0,1.6,0][p.atkType];
    if(p.atkTimer>dur*0.18 && p.atkTimer<dur*0.6)
      p.x=clamp(p.x+p.facing*lspd, camX+34, camX+W-34);
    // tornado: multi-hit ticks while spinning (works while moving)
    if(p.atkType===6 && p.atkTimer>6 && p.atkTimer<30 && p.atkTimer%8===2){
      const range=p.atkRange[6];
      enemies.forEach(e=>{
        if(e.dead||e.isFlying)return;
        if(Math.abs(e.x-p.x)<range&&Math.abs(e.y-p.y)<38)hitEnemy(e,Math.round(16*p.pwr),6,Math.sign(e.x-p.x)||1);
      });
      if(boss&&!boss.dead&&Math.abs(boss.x-p.x)<range+40&&Math.abs(boss.y-p.y)<52)
        hitBoss(Math.round(16*p.pwr),6,Math.sign(boss.x-p.x)||1);
      doShake(4,5);pAdd(p.x,p.y-40,8,'#4DD0E1',1.2);
    }
    if(p.atkType!==6 && p.atkTimer===Math.floor(dur*[0,0.40,0.55,0.45,0.42,0.50,0.50,0.45,0.55,0.6][p.atkType])){
      const range=p.atkRange[p.atkType],dmg=Math.round(p.atkDmg[p.atkType]*p.pwr);
      if(p.atkType===7){
        if(p.ammo>0){
          // ray gun bullet
          p.ammo--;
          PR.push({kind:'gun',x:p.x+p.facing*34,y:p.y,vx:p.facing*14,life:70,dir:p.facing,dmg:Math.round(30*p.pwr)});
          pAdd(p.x+p.facing*34,p.y-34,4,'#FFEB3B',1);
        } else {
          // energy ball launch
          PR.push({kind:'ball',x:p.x+p.facing*32,y:p.y,vx:p.facing*9.5,life:80,dir:p.facing,dmg:Math.round(22*p.pwr)});
          pAdd(p.x+p.facing*32,p.y-34,6,'#CE93D8',1);
        }
      } else if(p.atkType===9){
        // earthquake: shock spreads BOTH directions on the same lane
        doShake(10,16); pAdd(p.x,p.y,26,'#FF7043',2); pAdd(p.x,p.y,16,'#FFC107',1.6);
        enemies.forEach(e=>{
          if(e.dead||e.isFlying)return;
          if(Math.abs(e.x-p.x)<range&&Math.abs(e.y-p.y)<40)hitEnemy(e,dmg,9,Math.sign(e.x-p.x)||p.facing);
        });
        if(boss&&!boss.dead&&Math.abs(boss.x-p.x)<range+40&&Math.abs(boss.y-p.y)<54)
          hitBoss(dmg,9,Math.sign(boss.x-p.x)||p.facing);
      } else {
        // same-lane check: only enemies on (almost) the same depth line get hit
        const ax=p.x+p.facing*range*0.6;
        enemies.forEach(e=>{
          if(e.dead||e.isFlying)return;
          if(Math.abs(e.x-ax)<range*0.6&&Math.abs(e.y-p.y)<34)hitEnemy(e,dmg,p.atkType,p.facing);
        });
        if(boss&&!boss.dead){
          if(Math.abs(boss.x-ax)<range*0.6+34&&Math.abs(boss.y-p.y)<48)hitBoss(dmg,p.atkType,p.facing);
        }
      }
    }
    if(p.atkTimer>=dur){
      p.attacking=false;p.atkTimer=0;
      if(p.atkType===1){p.chainTimer=18;p.chainNext=4;}
      else if(p.atkType===4){p.chainTimer=18;p.chainNext=5;}
      else if(p.atkType===5){p.chainTimer=20;p.chainNext=8;}
      else p.chainNext=0;
    }
  }

  p.vx=0;p.vy=0;
  // tornado spins while moving
  const canMove=(!p.attacking||p.atkType===6)&&p.hurtTimer===0;
  const mv=p.attacking?0.85:1;
  if(canMove){
    if(keys['arrowleft']){p.vx=-p.speed*mv;p.facing=-1;}
    if(keys['arrowright']){p.vx=p.speed*mv;p.facing=1;}
    if(keys['arrowup'])p.vy=-p.speed*0.6*mv;
    if(keys['arrowdown'])p.vy=p.speed*0.6*mv;
  }
  p.x=clamp(p.x+p.vx, camX+34, camX+W-34);
  p.y=clamp(p.y+p.vy, GT+12, GB);

  if(p.hurtTimer>0)p.state='hurt';
  else if(p.attacking)p.state=p.atkType===3?'combo':'attack'+p.atkType;
  else if(p.vx!==0||p.vy!==0)p.state='walk';
  else p.state='idle';
  p.anim+=0.016;
}

function updateEnemies(){
  // spawn queue
  for(let i=SQ.length-1;i>=0;i--){
    SQ[i].t--;
    if(SQ[i].t<=0){
      const s=SQ.splice(i,1)[0];
      enemies.push(mkEnemy(s.type, s.side==='L'?camX-45:camX+W+45));
    }
  }
  enemies.forEach(e=>{
    if(e.dead){e.deadTimer--;return;}
    if(e.hurtTimer>0)e.hurtTimer--; if(e.atkCool>0)e.atkCool--;
    if(e.isFlying){
      e.flyVy+=0.42;e.x+=e.flyVx;e.y+=e.flyVy;e.flyAng+=e.flyAngV;
      if(e.y>=e.groundY){
        e.y=e.groundY;e.flyVy*=-0.42;e.flyVx*=0.52;e.flyAngV*=0.4;
        pAdd(e.x,e.y,6,'#885522');
        if(Math.abs(e.flyVy)<0.9){e.isFlying=false;e.flyAng=0;}
      }
      if(e.x<camX-90||e.x>camX+W+90)killEnemy(e);
      e.anim+=0.016;return;
    }
    const dx=player.x-e.x,dy=player.y-e.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    // delayed melee hit (dodgeable wind-up)
    if(e.meleeT>0){
      e.meleeT--;
      if(e.meleeT===0&&Math.hypot(player.x-e.x,player.y-e.y)<78)damagePlayer(e.dmg);
    }
    if(e.shootT>0){
      // robot: charge then fire a laser bolt
      e.shootT--; e.state='shoot';
      if(e.shootT===8)EP.push({kind:'laser',x:e.x+e.facing*26,y:e.y,vx:e.facing*6.5,life:90,dmg:12});
      if(e.shootT===0)e.state='idle';
    } else if(e.dashT>0){
      // elite: crouch telegraph, then dash thrust
      e.dashT--;
      if(e.state==='dashwind'){
        if(e.dashT===0){
          e.state='dash'; e.dashT=18; e.dashHit=false;
          e.dashVx=Math.sign(dx||1)*clamp(Math.abs(dx)/16,6.5,12);
          e.dashVy=clamp(dy/18,-2,2);
        }
      } else {
        e.x+=e.dashVx; e.y=clamp(e.y+e.dashVy,GT+8,GB);
        if(!e.dashHit&&Math.abs(player.x-e.x)<42&&Math.abs(player.y-e.y)<30){
          e.dashHit=true; damagePlayer(e.dmg+3);
        }
        if(e.dashT===0)e.state='idle';
      }
      e.facing=e.state==='dash'?Math.sign(e.dashVx)||1:(dx>0?1:-1);
    } else if(e.hurtTimer===0){
      e.facing=dx>0?1:-1;
      if(e.type==='robot'&&e.atkCool<=0&&d>120&&d<340&&Math.abs(dy)<34){
        e.shootT=26; e.state='shoot'; e.atkCool=150+Math.random()*70;
      } else if(e.type==='astro'&&e.thrower&&e.atkCool<=0&&d>110&&d<300){
        e.state='attack'; e.atkTimer=20; e.atkCool=150+Math.random()*80;
        EP.push({kind:'wrench',x:e.x+e.facing*14,y:e.y,vx:Math.sign(dx||1)*(2.6+Math.abs(dx)*0.004),h:34,hv:3.6,spin:0,life:160,dmg:8});
      } else if(e.type==='elite'&&e.atkCool<=0&&d>110&&d<260&&Math.abs(dy)<40){
        e.state='dashwind'; e.dashT=16; e.atkCool=170+Math.random()*60;
      } else if(d>52){
        const sp=e.fast?e.speed*1.55:e.speed;e.x+=dx/d*sp;e.y+=dy/d*sp*0.62;e.state='walk';
      } else {
        e.state='idle';
        if(e.atkCool<=0){
          e.state='attack';e.atkTimer=20;e.meleeT=9;e.atkCool=75+Math.random()*75;
        }
      }
    } else {e.state='hurt';e.facing=dx>0?1:-1;}
    if(e.atkTimer>0)e.atkTimer--;
    e.y=clamp(e.y,GT+8,GB);e.anim+=0.016;
  });
  enemies=enemies.filter(e=>!(e.dead&&e.deadTimer<=0));
}

function updateBoss(){
  const b=boss; if(!b)return;
  b.anim+=0.016;
  if(b.hurtT>0)b.hurtT--;
  if(b.noFist>0)b.noFist--;

  if(b.dead){
    b.deadT--;
    b.expT--;
    if(b.expT<=0){
      b.expT=10;
      pAdd(b.x+rnd(-45,45)*b.scale*0.6, b.y-rnd(0,80)*b.scale*0.6, 14, Math.random()>0.5?'#FF6F00':'#ffee55', 1.8);
      doShake(4,5);
    }
    if(b.deadT<=0){
      bossKilled[b.idx]=true;
      const wasFinal=b.idx===3;
      boss=null;
      player.hp=player.maxHp;
      htAdd(player.x,player.y-140,'체력 회복!','#66FF99');
      if(wasFinal){ scene=SC.WIN; winT=0; }
      else {
        finishEncounter();
        showBanner('격파!!','전진하라! GO →','#66FF99',150);
      }
    }
    return;
  }

  const dx=player.x-b.x, dy=player.y-b.y, ad=Math.abs(dx);

  if(b.state==='enter'){
    b.facing=-1; b.moving=true;
    b.x-=1.7;
    if(b.x<camX+W-150){b.state='idle';b.t=55;b.moving=false;}
  }
  else if(b.state==='idle'){
    b.facing=dx>0?1:-1; b.t--;
    if(ad>95){b.x+=Math.sign(dx)*b.spd; b.y=clamp(b.y+clamp(dy,-1,1)*b.spd*0.55,GT+16,GB); b.moving=true;}
    else b.moving=false;
    if(b.t<=0){
      // per-boss attack pools
      let pool;
      if(b.type==='captain') pool= ad<150?['slam','slam','dash','jump']:['dash','slam','jump','jump'];
      else if(b.type==='mech') pool= ad<160?['slam','slam','rocket']:['rocket','rocket','slam','dash'];
      else if(b.type==='overlord') pool= ad<150?['slam','dash','volley']:['dash','volley','volley','slam'];
      else pool= ad<160?['quake','slam','rocket','quake']:['dash','volley','quake','rocket']; // titan
      if(b.type==='overlord'&&b.phase===2&&Math.random()<0.2){
        b.state='tele'; b.t=16;
      } else {
        b.next=pool[Math.floor(Math.random()*pool.length)];
        b.state='windup';
        b.wuT=(b.phase===2?27:30)+(b.next==='jump'?6:0);
        b.t=b.wuT;
      }
    }
  }
  else if(b.state==='windup'){
    b.moving=false; b.t--;
    if(b.t<=0){
      b.state=b.next;
      if(b.next==='dash'){
        b.t=44; b.vx=Math.sign(dx||1)*(6.5+b.phase*1.5);
        b.vy=clamp(dy/44,-1.5,1.5);
      }
      else if(b.next==='jump'){b.t=30;b.airY=0;b.tgx=player.x;b.tgy=player.y;}
      else if(b.next==='rocket')b.t=14;
      else if(b.next==='volley')b.t=34;
      else if(b.next==='quake')b.t=44;
      else b.t=30;
    }
  }
  else if(b.state==='jump'){
    // jetpack rise: tracks the player, then locks the target
    b.moving=false; b.t--;
    b.airY=Math.min(240,b.airY+16);
    if(b.t>14){ b.tgx=player.x; b.tgy=player.y; }
    if(b.t<=0){ b.x=b.tgx; b.y=b.tgy; b.facing=player.x>b.x?1:-1; b.state='dive'; b.t=13; }
  }
  else if(b.state==='dive'){
    b.moving=false; b.t--;
    b.airY=Math.max(0,b.airY-20);
    if(b.t<=0){
      b.airY=0;
      doShake(10,14);
      pAdd(b.x,b.y,26,'#FF7700',2);
      SW.push({x:b.x-26,y:b.y,vx:-5,life:95,dmg:b.dmgS});
      SW.push({x:b.x+26,y:b.y,vx:5,life:95,dmg:b.dmgS});
      if(Math.abs(player.x-b.x)<80&&Math.abs(player.y-b.y)<42)damagePlayer(b.dmgD+4);
      b.tgx=null;
      b.state='recover'; b.t=40;
    }
  }
  else if(b.state==='rocket'){
    b.moving=false; b.t--;
    if(b.t===6){
      EP.push({kind:'fist',x:b.x+b.facing*44,y:b.y,vx:b.facing*8.5,life:75,dmg:b.dmgD});
      b.noFist=40; doShake(4,5);
    }
    if(b.t<=0){b.state='recover';b.t=38;}
  }
  else if(b.state==='volley'){
    b.moving=false; b.t--;
    if(b.t===28||b.t===18||b.t===8){
      const dirv=Math.sign(player.x-b.x)||1;
      EP.push({kind:'bolt',x:b.x+dirv*30,y:player.y,vx:dirv*7,life:90,dmg:Math.round(b.dmgS*0.8)});
      pAdd(b.x+dirv*30,b.y-40,4,'#E040FB',1);
    }
    if(b.t<=0){b.state='recover';b.t=36-b.phase*6;}
  }
  else if(b.state==='tele'){
    b.moving=false; b.t--;
    if(b.t===10){
      pAdd(b.x,b.y-40,18,'#7C4DFF',1.6);
      b.x=clamp(player.x-player.facing*130,camX+50,camX+W-50);
      b.y=player.y;
      pAdd(b.x,b.y-40,18,'#7C4DFF',1.6);
    }
    if(b.t<=0){
      b.facing=Math.sign(player.x-b.x)||1;
      b.state='windup'; b.next=Math.abs(player.x-b.x)<150?'slam':'volley';
      b.wuT=16; b.t=16;
    }
  }
  else if(b.state==='dash'){
    b.x+=b.vx; b.y=clamp(b.y+b.vy,GT+16,GB); b.t--;
    if(Math.abs(player.x-b.x)<58*b.scale*0.6&&Math.abs(player.y-b.y)<42) damagePlayer(b.dmgD);
    if(b.t<=0||b.x<camX+50||b.x>camX+W-50){b.state='recover';b.t=42-b.phase*8;}
  }
  else if(b.state==='slam'){
    b.moving=false; b.t--;
    if(b.t===14){
      doShake(9,12);
      pAdd(b.x+b.facing*30,b.y,20,'#FF7700',1.7);
      const sv=4.4+b.phase*0.8;
      SW.push({x:b.x-26,y:b.y,vx:-sv,life:95,dmg:b.dmgS});
      SW.push({x:b.x+26,y:b.y,vx:sv,life:95,dmg:b.dmgS});
      if(b.phase===2){
        SW.push({x:b.x,y:player.y,vx:Math.sign(dx||1)*sv*1.15,life:95,dmg:b.dmgS});
      }
      if(Math.abs(player.x-b.x)<120&&Math.abs(player.y-b.y)<52) damagePlayer(b.dmgS);
    }
    if(b.t<=0){b.state='recover';b.t=46-b.phase*10;}
  }
  else if(b.state==='quake'){
    // titan: double ground pound — spreading walls of shockwaves (dodge by changing lane)
    b.moving=false; b.t--;
    if(b.t===30||b.t===16){
      doShake(9,13);
      pAdd(b.x,b.y,22,'#FF7043',1.9); pAdd(b.x,b.y,14,'#FFC107',1.5);
      const sv=3.8+b.phase*0.6;
      for(let k=1;k<=2;k++){
        SW.push({x:b.x,y:b.y,vx:-(sv+k*1.6),life:120,dmg:b.dmgS});
        SW.push({x:b.x,y:b.y,vx:(sv+k*1.6),life:120,dmg:b.dmgS});
      }
      if(Math.abs(player.x-b.x)<72&&Math.abs(player.y-b.y)<50)damagePlayer(b.dmgS);
    }
    if(b.t<=0){b.state='recover';b.t=48-b.phase*10;}
  }
  else if(b.state==='recover'){
    b.moving=false; b.t--;
    if(b.t<=0){b.state='idle';b.t=55+Math.random()*45-(b.phase-1)*12;}
  }
  b.x=clamp(b.x,camX+40,camX+W+100);
}

function updateSW(){
  for(let i=SW.length-1;i>=0;i--){
    const s=SW[i];
    s.x+=s.vx; s.life--;
    if(player.inv===0&&Math.abs(player.x-s.x)<28&&Math.abs(player.y-s.y)<36){
      damagePlayer(s.dmg); SW.splice(i,1); continue;
    }
    if(s.life<=0||s.x<camX-60||s.x>camX+W+60) SW.splice(i,1);
  }
}
function drawSW(){
  SW.forEach(s=>{
    const sx=s.x-camX, a=clamp(s.life/95,0,1);
    cx.save(); cx.globalAlpha=0.75*a;
    cx.strokeStyle='#FF6F00'; cx.lineWidth=3;
    cx.beginPath(); cx.arc(sx,s.y-4,12,Math.PI,Math.PI*2); cx.stroke();
    cx.strokeStyle='#FFD54F'; cx.lineWidth=2;
    cx.beginPath(); cx.arc(sx,s.y-4,7,Math.PI,Math.PI*2); cx.stroke();
    cx.globalAlpha=0.4*a; cx.fillStyle='#FF6F00';
    cx.beginPath(); cx.ellipse(sx-s.vx*2,s.y,14,4,0,0,Math.PI*2); cx.fill();
    cx.restore();
  });
}

// ── Enemy projectiles (wrench lobs / lasers) ────────────
function updateEP(){
  for(let i=EP.length-1;i>=0;i--){
    const b2=EP[i]; b2.life--;
    if(b2.kind==='wrench'){
      b2.x+=b2.vx; b2.h+=b2.hv; b2.hv-=0.22; b2.spin+=0.32;
      if(b2.h<=6){ pAdd(b2.x,b2.y,5,'#998877',0.8); EP.splice(i,1); continue; }
    } else {
      b2.x+=b2.vx;
    }
    const rad=b2.kind==='fist'?34:24;
    if(player.inv===0&&Math.abs(player.x-b2.x)<rad&&Math.abs(player.y-b2.y)<32&&(b2.kind!=='wrench'||b2.h<46)){
      damagePlayer(b2.dmg); EP.splice(i,1); continue;
    }
    if(b2.life<=0||b2.x<camX-60||b2.x>camX+W+60)EP.splice(i,1);
  }
}
function drawEP(){
  EP.forEach(b2=>{
    const sx=b2.x-camX;
    if(b2.kind==='fist'){
      // rocket punch
      const sy=b2.y-36, dir2=Math.sign(b2.vx)||1;
      cx.fillStyle='rgba(0,0,0,0.25)';
      cx.beginPath(); cx.ellipse(sx,b2.y,14,4,0,0,Math.PI*2); cx.fill();
      // flame trail
      for(let i=1;i<=3;i++){
        cx.globalAlpha=0.4*(4-i)/3;
        cx.fillStyle=i===1?'#FFB300':'#ff6f00';
        cx.beginPath(); cx.arc(sx-b2.vx*i*1.4,sy,9-i*2,0,Math.PI*2); cx.fill();
      }
      cx.globalAlpha=1;
      cx.fillStyle='#31353f';
      cx.beginPath(); cx.arc(sx,sy,14,0,Math.PI*2); cx.fill();
      cx.strokeStyle='#241200'; cx.lineWidth=2.6; cx.stroke();
      cx.fillStyle='#9aa2b2'; cx.globalAlpha=0.7;
      [-6,0,6].forEach(kx=>cx.fillRect(sx+kx*dir2-1.5,sy-10,3,5));
      cx.globalAlpha=1;
      return;
    }
    if(b2.kind==='bolt'){
      // overlord energy bolt
      const sy=b2.y-32;
      cx.fillStyle='rgba(0,0,0,0.22)';
      cx.beginPath(); cx.ellipse(sx,b2.y,10,3,0,0,Math.PI*2); cx.fill();
      cx.save();
      cx.shadowColor='#E040FB'; cx.shadowBlur=12;
      for(let i=1;i<=2;i++){
        cx.globalAlpha=0.3*(3-i)/2;
        cx.fillStyle='#CE93D8';
        cx.beginPath(); cx.arc(sx-b2.vx*i*1.8,sy,7-i*1.5,0,Math.PI*2); cx.fill();
      }
      cx.globalAlpha=1;
      cx.fillStyle='#E040FB';
      cx.beginPath();
      cx.moveTo(sx+10,sy); cx.lineTo(sx,sy-7); cx.lineTo(sx-10,sy); cx.lineTo(sx,sy+7);
      cx.closePath(); cx.fill();
      cx.strokeStyle='#241200'; cx.lineWidth=1.8; cx.stroke();
      cx.fillStyle='#fff';
      cx.beginPath(); cx.arc(sx,sy,2.6,0,Math.PI*2); cx.fill();
      cx.restore();
      return;
    }
    if(b2.kind==='laser'){
      const sy=b2.y-30, dir2=Math.sign(b2.vx)||1;
      // ground shadow
      cx.fillStyle='rgba(0,0,0,0.22)';
      cx.beginPath(); cx.ellipse(sx,b2.y,12,3,0,0,Math.PI*2); cx.fill();
      cx.save();
      // long streak tail
      const lg=cx.createLinearGradient(sx-dir2*52,sy,sx,sy);
      lg.addColorStop(0,'rgba(255,23,68,0)'); lg.addColorStop(1,'rgba(255,82,82,0.85)');
      cx.fillStyle=lg;
      cx.beginPath();
      cx.moveTo(sx-dir2*52,sy);
      cx.lineTo(sx,sy-5); cx.lineTo(sx,sy+5);
      cx.closePath(); cx.fill();
      // bolt
      cx.shadowColor='#ff1744'; cx.shadowBlur=16;
      cx.fillStyle='#ff5252';
      cx.beginPath(); cx.ellipse(sx,sy,15,6,0,0,Math.PI*2); cx.fill();
      cx.shadowBlur=0;
      cx.strokeStyle='#241200'; cx.lineWidth=1.8; cx.stroke();
      cx.fillStyle='#fff';
      cx.beginPath(); cx.ellipse(sx+dir2*3,sy,7,2.6,0,0,Math.PI*2); cx.fill();
      cx.restore();
    } else {
      const sy=b2.y-b2.h;
      // ground shadow tracks the lob (dodge cue)
      cx.fillStyle='rgba(0,0,0,0.28)';
      cx.beginPath(); cx.ellipse(sx,b2.y,10,3.2,0,0,Math.PI*2); cx.fill();
      // motion ghosts
      for(let i=1;i<=2;i++){
        cx.globalAlpha=0.22*(3-i)/2;
        cx.save(); cx.translate(sx-b2.vx*i*2.2,sy+i*2); cx.rotate(b2.spin-i*0.5);
        cx.fillStyle='#9aa0ad'; cx.fillRect(-9,-3.2,18,6.4);
        cx.restore();
      }
      cx.globalAlpha=1;
      cx.save(); cx.translate(sx,sy); cx.rotate(b2.spin);
      cx.fillStyle='#b8bfcc';
      cx.fillRect(-9,-3.2,18,6.4);
      cx.strokeStyle='#241200'; cx.lineWidth=2.2; cx.strokeRect(-9,-3.2,18,6.4);
      cx.fillStyle='#8a909d';
      cx.beginPath(); cx.arc(-9,0,5.2,0,Math.PI*2); cx.fill();
      cx.strokeStyle='#241200'; cx.lineWidth=2; cx.stroke();
      cx.fillStyle='rgba(255,255,255,0.5)';
      cx.fillRect(-7,-2.4,14,1.8);
      cx.restore();
    }
  });
}

// ── Player energy balls ─────────────────────────────────
function updatePR(){
  for(let i=PR.length-1;i>=0;i--){
    const pr=PR[i]; pr.x+=pr.vx; pr.life--;
    const isGun=pr.kind==='gun';
    // sparkle dust while flying
    if(pr.life%4===0)pAdd(pr.x-pr.vx*2,pr.y-34+rnd(-6,6),1,isGun?'#FFF59D':'#E1BEE7',0.5);
    let hit=false;
    for(const e of enemies){
      if(e.dead||e.isFlying)continue;
      if(Math.abs(e.x-pr.x)<26&&Math.abs(e.y-pr.y)<28){
        hitEnemy(e,pr.dmg||22,isGun?8:7,pr.dir); hit=true; break;
      }
    }
    if(!hit&&boss&&!boss.dead&&Math.abs(boss.x-pr.x)<46&&Math.abs(boss.y-pr.y)<48){
      hitBoss(pr.dmg||22,isGun?8:7,pr.dir); hit=true;
    }
    if(hit){
      pAdd(pr.x,pr.y-34,16,isGun?'#FFF59D':'#E1BEE7',1.9);
      pAdd(pr.x,pr.y-34,10,isGun?'#FFB300':'#9C27B0',1.3);
      htAdd(pr.x,pr.y-70,isGun?'PEW!':'ZAP!',isGun?'#FFEB3B':'#CE93D8');
      doShake(3,4);
      PR.splice(i,1); continue;
    }
    if(pr.life<=0||pr.x<camX-60||pr.x>camX+W+60) PR.splice(i,1);
  }
}
function drawPR(){
  PR.forEach(pr=>{
    const sx=pr.x-camX, sy=pr.y-34, t2=pr.life*0.25;
    if(pr.kind==='gun'){
      // ray gun tracer
      cx.fillStyle='rgba(0,0,0,0.22)';
      cx.beginPath(); cx.ellipse(sx,pr.y,9,2.8,0,0,Math.PI*2); cx.fill();
      cx.strokeStyle='rgba(255,235,59,0.4)'; cx.lineWidth=7; cx.lineCap='round';
      cx.beginPath(); cx.moveTo(sx-pr.vx*3,sy); cx.lineTo(sx,sy); cx.stroke();
      cx.strokeStyle='#FFF59D'; cx.lineWidth=2.6;
      cx.beginPath(); cx.moveTo(sx-pr.vx*3,sy); cx.lineTo(sx,sy); cx.stroke();
      cx.fillStyle='#FFEB3B';
      cx.beginPath(); cx.ellipse(sx,sy,9,3.6,0,0,Math.PI*2); cx.fill();
      cx.strokeStyle='#241200'; cx.lineWidth=1.6; cx.stroke();
      cx.fillStyle='#fff';
      cx.beginPath(); cx.ellipse(sx+Math.sign(pr.vx)*2,sy,4,1.6,0,0,Math.PI*2); cx.fill();
      return;
    }
    // ground shadow (depth cue)
    cx.fillStyle='rgba(0,0,0,0.25)';
    cx.beginPath(); cx.ellipse(sx,pr.y,12,3.5,0,0,Math.PI*2); cx.fill();
    // long comet trail
    for(let i=1;i<=5;i++){
      cx.globalAlpha=0.30*(6-i)/5;
      cx.fillStyle=i<3?'#E1BEE7':'#9C27B0';
      cx.beginPath(); cx.arc(sx-pr.vx*i*2.0,sy+Math.sin(t2+i)*2,11-i*1.7,0,Math.PI*2); cx.fill();
    }
    cx.globalAlpha=1;
    // big outer glow
    const g=cx.createRadialGradient(sx,sy,2,sx,sy,20);
    g.addColorStop(0,'#ffffff'); g.addColorStop(0.35,'#CE93D8'); g.addColorStop(1,'rgba(156,39,176,0)');
    cx.fillStyle=g; cx.beginPath(); cx.arc(sx,sy,20,0,Math.PI*2); cx.fill();
    // core
    cx.fillStyle='#9C27B0';
    cx.beginPath(); cx.arc(sx,sy,8.5,0,Math.PI*2); cx.fill();
    cx.strokeStyle='#241200'; cx.lineWidth=2; cx.stroke();
    cx.fillStyle='#fff';
    cx.beginPath(); cx.arc(sx-2,sy-2,3.4,0,Math.PI*2); cx.fill();
    // spinning energy ring
    cx.strokeStyle='rgba(255,255,255,0.85)'; cx.lineWidth=2.2;
    cx.beginPath(); cx.arc(sx,sy,13,t2,t2+Math.PI*1.1); cx.stroke();
    cx.strokeStyle='rgba(225,190,231,0.7)'; cx.lineWidth=1.6;
    cx.beginPath(); cx.arc(sx,sy,16,-t2*1.3,-t2*1.3+Math.PI*0.8); cx.stroke();
  });
}

// zone banner triggers

  }
}

// ── Main loop ──────────────────────────────────────────
// ── Fixed-timestep loop (mobile) ────────────────────────
// Logic runs at a steady 60 ticks/sec no matter the render fps, so movement &
// response feel identical even when the phone can't paint 60fps. Rendering then
// happens once per animation frame.
const STEP=1/60;
let _acc=0, _last=0;

function update(){            // all game-state mutation — fixed rate
  shkTick();
  updatePlayer();
  updateEnemies();
  updateBoss();
  updateSW();
  updatePR();
  updateEP();
  updateItems();
  updateCam();
  checkZone();
  if(lock==null && encIdx<ENC.length && camX>=ENC[encIdx].cam-5){
    startEncounter(ENC[encIdx]);
  } else if(lock!=null && !boss && encounterCleared()){
    finishEncounter();
  }
  pTick(); htTick();
  Object.assign(prev,keys);
}

function render(){           // pure drawing — once per animation frame
  cx.save(); cx.translate(shkX,shkY);
  drawBG(gTime);
  if(scene!==SC.INTRO && player){
    drawItems();
    const ents=[
      {y:player.y,fn:()=>drawAlien(player.x-camX,player.y,player.facing,player.state,player.anim,
        player.attacking?player.atkTimer/player.atkDur[player.atkType]:0)},
      ...enemies.map(e=>({y:e.isFlying?e.groundY:e.y,
        fn:()=>ETYPE[e.type].draw(e.x-camX,e.y,e.facing,e.state,e.anim,e.hp,e.maxHp,e.isFlying,e.flyAng)}))
    ];
    if(boss) ents.push({y:boss.y,fn:()=>drawBoss(boss)});
    ents.sort((a,b)=>a.y-b.y);
    ents.forEach(en=>en.fn());
    drawSW();
    drawPR();
    drawEP();
    pDraw(); htDraw();
  }
  if(scene===SC.PLAY){drawHUD(player,score);drawBanner();}
  else if(scene===SC.INTRO) scrIntro();
  else if(scene===SC.OVER){drawHUD(player,score);scrOver();}
  else if(scene===SC.WIN){scrWin();}
  cx.restore();
}

function loop(ts){
  requestAnimationFrame(loop);
  gTime=ts/1000;
  let dt=_last?(ts-_last)/1000:0; _last=ts;
  if(dt>0.25)dt=0.25;            // clamp big gaps (tab switch / hitch)
  if(scene===SC.PLAY){
    _acc+=dt;
    let n=0;
    while(_acc>=STEP && n<5){     // catch up at fixed rate, capped to avoid spiral
      update(); _acc-=STEP; n++;
      if(scene!==SC.PLAY) break;  // a tick ended the run
    }
  } else { _acc=0; }
  render();
}

function act(){if(scene===SC.INTRO||scene===SC.OVER||scene===SC.WIN)startGame();}
window.addEventListener('keydown',e=>{if(e.code==='Enter'||e.key==='Enter')act();});
CV.addEventListener('click',act);

requestAnimationFrame(loop);

// ── Touch controls (mobile) ─────────────────────────────
(function(){
  const joy=document.getElementById('joy'), knob=document.getElementById('joyknob');
  let joyId=null;
  const JR=42;        // knob travel
  const DEAD=14;      // dead zone
  function setDir(dx,dy){
    keys['arrowleft']=dx<-DEAD; keys['arrowright']=dx>DEAD;
    keys['arrowup']=dy<-DEAD;   keys['arrowdown']=dy>DEAD;
  }
  function joyPos(t){
    const r=joy.getBoundingClientRect();
    return [t.clientX-(r.left+r.width/2), t.clientY-(r.top+r.height/2)];
  }
  function moveKnob(dx,dy){
    knob.style.transform='translate('+clamp(dx,-JR,JR)+'px,'+clamp(dy,-JR,JR)+'px)';
  }
  joy.addEventListener('touchstart',e=>{
    e.preventDefault();
    const t=e.changedTouches[0]; joyId=t.identifier;
    const p=joyPos(t); setDir(p[0],p[1]); moveKnob(p[0],p[1]);
  },{passive:false});
  joy.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.changedTouches){
      if(t.identifier!==joyId)continue;
      const p=joyPos(t); setDir(p[0],p[1]); moveKnob(p[0],p[1]);
    }
  },{passive:false});
  const joyEnd=e=>{
    for(const t of e.changedTouches){
      if(t.identifier!==joyId)continue;
      joyId=null; setDir(0,0); moveKnob(0,0);
    }
  };
  joy.addEventListener('touchend',joyEnd);
  joy.addEventListener('touchcancel',joyEnd);

  // attack buttons → same key map as the keyboard
  document.querySelectorAll('.tbtn').forEach(btn=>{
    const k=btn.dataset.key;
    const on=e=>{e.preventDefault();keys[k]=true;btn.classList.add('on');};
    const off=e=>{e.preventDefault();keys[k]=false;btn.classList.remove('on');};
    btn.addEventListener('touchstart',on,{passive:false});
    btn.addEventListener('touchend',off);
    btn.addEventListener('touchcancel',off);
  });

  // tap the game screen to start / restart
  CV.addEventListener('touchstart',()=>{act();},{passive:true});
})();
</script>
