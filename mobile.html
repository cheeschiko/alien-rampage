<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>외계인 대소동: 지구 정복기 (모바일)</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { overscroll-behavior:none; }
body { background:#060614; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; min-height:100dvh; font-family:'Courier New',monospace; user-select:none; -webkit-user-select:none; touch-action:none; }
canvas { display:block; border:2px solid #1a1a3a; box-shadow:0 0 50px rgba(120,80,255,0.2);
         width:min(100vw, 170vh); max-width:100vw; height:auto; touch-action:none; }
#ctrl { display:none; }
/* ── touch UI ── */
#touchui { position:fixed; inset:0; pointer-events:none; z-index:10; }
#joy { position:absolute; left:14px; bottom:14px; width:134px; height:134px; border-radius:50%;
  background:rgba(255,255,255,0.07); border:2px solid rgba(255,255,255,0.25);
  pointer-events:auto; touch-action:none; }
#joyknob { position:absolute; left:50%; top:50%; width:56px; height:56px; margin:-28px 0 0 -28px;
  border-radius:50%; background:rgba(255,255,255,0.22); border:2px solid rgba(255,255,255,0.4); }
.tbtn { position:absolute; pointer-events:auto; touch-action:none; width:64px; height:64px; border-radius:50%;
  background:rgba(255,255,255,0.10); border:2px solid rgba(255,255,255,0.30); color:#cfd6ff;
  font:bold 14px 'Courier New'; display:flex; align-items:center; justify-content:center; flex-direction:column; }
.tbtn.on { background:rgba(255,235,120,0.35); border-color:rgba(255,235,120,0.8); }
.tbtn small { font-size:9px; color:#8893bb; font-weight:normal; }
#btnA { right:16px;  bottom:18px; }
#btnS { right:92px;  bottom:44px; }
#btnD { right:34px;  bottom:96px; }
#btnF { right:112px; bottom:122px; width:56px; height:56px; }
#rotate { display:none; position:fixed; inset:0; background:#060614; z-index:50;
  color:#FFD700; font:bold 18px 'Courier New'; align-items:center; justify-content:center; text-align:center; line-height:1.8; }
@media (orientation:portrait){ #rotate { display:flex; } }
</style>
</head>
<body>
<canvas id="c" width="800" height="450"></canvas>
<div id="ctrl"></div>
<div id="touchui">
  <div id="joy"><div id="joyknob"></div></div>
  <div class="tbtn" id="btnA" data-key="a">잽<small>연타=연계</small></div>
  <div class="tbtn" id="btnS" data-key="s">강타<small>→잽=어퍼</small></div>
  <div class="tbtn" id="btnD" data-key="d">회오리</div>
  <div class="tbtn" id="btnF" data-key="f">빔</div>
</div>
<div id="rotate">📱<br>화면을 가로로 돌려주세요!</div>
<script>
const CV = document.getElementById('c');
const cx = CV.getContext('2d');
// ── mobile perf: shadowBlur / filter are GPU killers on phones — no-op them ──
try{ Object.defineProperty(cx,'shadowBlur',{get(){return 0;},set(){}}); }catch(e){}
try{ Object.defineProperty(cx,'filter',{get(){return 'none';},set(){}}); }catch(e){}
const W = 800, H = 450;
const GT = 238, GB = 346, GL = GT - 20;
const WORLD = 12500;            // total world width
const Z1 = 3600, Z2 = 7000;     // zone boundaries (world x)

// ── Input (e.code based: works even with Korean IME on) ─
const keys = {}, prev = {};
const CODEMAP = {KeyA:'a',KeyS:'s',KeyD:'d',KeyF:'f',
  ArrowLeft:'arrowleft',ArrowRight:'arrowright',ArrowUp:'arrowup',ArrowDown:'arrowdown',Enter:'enter'};
window.addEventListener('keydown', e => {
  const k = CODEMAP[e.code] || e.key.toLowerCase();
  keys[k] = true;
  if (CODEMAP[e.code]) e.preventDefault();
});
window.addEventListener('keyup', e => {
  const k = CODEMAP[e.code] || e.key.toLowerCase();
  keys[k] = false;
});
// don't leave keys stuck when the window loses focus
window.addEventListener('blur', () => { for(const k in keys) keys[k]=false; });
function jp(k) { return keys[k] && !prev[k]; }

// ── Utils ──────────────────────────────────────────────
const clamp = (v,a,b) => Math.min(Math.max(v,a),b);
const lerp  = (a,b,t) => a + (b-a)*t;
const rnd   = (a,b) => a + Math.random()*(b-a);
const hsh   = i => { const s = Math.sin(i*127.13)*43758.5453; return s - Math.floor(s); };

// blend 3 zone colors by weights
function mix3(cols,wts){
  const p=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
  let r=0,g=0,b=0;
  for(let i=0;i<3;i++){const c=p(cols[i]);r+=c[0]*wts[i];g+=c[1]*wts[i];b+=c[2]*wts[i];}
  return 'rgb('+Math.round(r)+','+Math.round(g)+','+Math.round(b)+')';
}
// zone weights at world position c, with 500px fade bands
function zoneMix(c){
  const f=500;
  let w2=clamp((c-(Z1-f/2))/f,0,1), w3=clamp((c-(Z2-f/2))/f,0,1);
  return [1-w2, w2-w3, w3];
}

// ── Rounded rect fill helper ────────────────────────────
function rr(x,y,w,h,r) {
  cx.beginPath();
  cx.moveTo(x+r,y); cx.lineTo(x+w-r,y); cx.quadraticCurveTo(x+w,y,x+w,y+r);
  cx.lineTo(x+w,y+h-r); cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  cx.lineTo(x+r,y+h); cx.quadraticCurveTo(x,y+h,x,y+h-r);
  cx.lineTo(x,y+r); cx.quadraticCurveTo(x,y,x+r,y);
  cx.closePath(); cx.fill();
}

// ── Particles (world coords) ────────────────────────────
const P = [];
function pAdd(x,y,n,col,spd=1) {
  if(P.length>120) return;          // mobile: hard cap keeps draw cost bounded
  n=Math.ceil(n*0.55);              // mobile: lighter particle bursts
  for(let i=0;i<n;i++){
    const a=rnd(0,Math.PI*2), s=rnd(2,7)*spd;
    P.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-rnd(1,3),r:rnd(2,5),col,life:1,dec:rnd(.03,.07)});
  }
}
function pTick() {
  for(let i=P.length-1;i>=0;i--){
    const p=P[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.28; p.life-=p.dec;
    if(p.life<=0) P.splice(i,1);
  }
}
function pDraw() {
  P.forEach(p=>{
    cx.globalAlpha=p.life*p.life; cx.fillStyle=p.col;
    cx.beginPath(); cx.arc(p.x-camX,p.y,p.r,0,Math.PI*2); cx.fill();
  });
  cx.globalAlpha=1;
}

// ── Hit texts (world coords) ────────────────────────────
const HT = [];
function htAdd(x,y,t,col='#fff') { HT.push({x,y,t,col,life:1,vy:-1.8}); }
function htTick() {
  for(let i=HT.length-1;i>=0;i--){
    const h=HT[i]; h.y+=h.vy; h.vy*=0.9; h.life-=0.026;
    if(h.life<=0) HT.splice(i,1);
  }
}
function htDraw() {
  HT.forEach(h=>{
    cx.save(); cx.globalAlpha=h.life;
    cx.font='bold 19px Courier New'; cx.textAlign='center';
    cx.shadowColor=h.col; cx.shadowBlur=8;
    cx.strokeStyle='rgba(0,0,0,0.6)'; cx.lineWidth=3;
    cx.strokeText(h.t,h.x-camX,h.y);
    cx.fillStyle=h.col; cx.fillText(h.t,h.x-camX,h.y);
    cx.restore();
  });
}

// ── Screen shake ───────────────────────────────────────
let shkT=0, shkX=0, shkY=0;
function doShake(a,d){shkT=d; shkX=a; shkY=a;}
function shkTick(){if(shkT>0){shkT--;shkX=rnd(-7,7);shkY=rnd(-4,4);}else{shkX=shkY=0;}}

// ── World props (generated once, world coords) ─────────
// Zone1: ruined city buildings
const bldg=[];
(function(){
  let bx=-80, bi=0;
  while(bx<Z1+300){
    const bw=28+hsh(bi)*40, bh=70+hsh(bi+7)*62;
    const rows=Math.floor((bh-14)/13), cols=Math.floor((bw-8)/10);
    const win=[];
    for(let i=0;i<rows*cols;i++) win.push(hsh(bi*97+i)>0.42);
    bldg.push({x:bx,w:bw,h:bh,win,rows,cols,broken:hsh(bi+33)>0.7});
    bx+=bw+8+hsh(bi+3)*34; bi++;
  }
})();
// Zone2: mesas / rocks
const rocks=[];
(function(){
  let rx=Z1-150, ri=0;
  while(rx<Z2+300){
    rocks.push({x:rx, w:60+hsh(ri)*130, h:40+hsh(ri+5)*75, t:hsh(ri+9)});
    rx+=130+hsh(ri+2)*180; ri++;
  }
})();
// Zone3: base towers
const towers=[];
(function(){
  let tx=Z2-100, ti=0;
  while(tx<WORLD+400){
    towers.push({x:tx, w:46+hsh(ti)*40, h:80+hsh(ti+4)*55, lit:hsh(ti+8)});
    tx+=200+hsh(ti+2)*220; ti++;
  }
})();
const stars = Array.from({length:110},()=>({x:rnd(0,W),y:rnd(0,H*0.55),r:rnd(0.4,2),p:rnd(0,Math.PI*2)}));

// sky / ground palettes per zone
const SKY_T=['#2a1838','#3a1208','#01040c'];
const SKY_B=['#6a4376','#7a3210','#0c1834'];
const GND_T=['#33531f','#46200c','#1e2430'];
const GND_M=['#2c481b','#5c2c12','#2a3242'];
const GND_B=['#142508','#260e04','#10141e'];

function drawBG(t){
  const c=camX+W/2, zw=zoneMix(c);
  // sky
  const sk=cx.createLinearGradient(0,0,0,H*0.68);
  sk.addColorStop(0,mix3(SKY_T,zw)); sk.addColorStop(1,mix3(SKY_B,zw));
  cx.fillStyle=sk; cx.fillRect(0,0,W,H*0.68);
  // stars (fade out in zone2 daylight haze)
  const starA=zw[0]+zw[2]*0.9;
  if(starA>0.05){
    stars.forEach(s=>{
      s.p+=0.035; cx.globalAlpha=(0.35+0.45*Math.abs(Math.sin(s.p)))*starA;
      cx.fillStyle='#bbccff'; cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2); cx.fill();
    });
    cx.globalAlpha=1;
  }
  // ── Zone1 celestial: red planet + moon + UFO ──
  if(zw[0]>0.03){
    cx.globalAlpha=zw[0];
    const pg=cx.createRadialGradient(626,56,5,638,64,54);
    pg.addColorStop(0,'#e06050'); pg.addColorStop(0.5,'#b03828'); pg.addColorStop(1,'#6a1a10');
    cx.fillStyle=pg; cx.beginPath(); cx.arc(638,64,52,0,Math.PI*2); cx.fill();
    cx.fillStyle='rgba(90,18,8,0.5)'; cx.beginPath(); cx.ellipse(638,76,48,15,0.28,0,Math.PI*2); cx.fill();
    cx.fillStyle='#7788aa'; cx.beginPath(); cx.arc(126,56,22,0,Math.PI*2); cx.fill();
    cx.fillStyle='rgba(40,55,78,0.5)';
    [[-8,6,5],[8,-5,4],[2,10,3]].forEach(([dx,dy,mr])=>{cx.beginPath();cx.arc(126+dx,56+dy,mr,0,Math.PI*2);cx.fill();});
    drawUFO(312+Math.sin(t*0.38)*28, 84+Math.sin(t*0.65)*9, t);
    cx.globalAlpha=1;
  }
  // ── Zone2 celestial: huge dying sun + red twin ──
  if(zw[1]>0.03){
    cx.globalAlpha=zw[1];
    const sg=cx.createRadialGradient(560,90,8,560,90,70);
    sg.addColorStop(0,'#ffd27a'); sg.addColorStop(0.4,'#ff8c2a'); sg.addColorStop(1,'rgba(180,50,0,0)');
    cx.fillStyle=sg; cx.beginPath(); cx.arc(560,90,70,0,Math.PI*2); cx.fill();
    cx.fillStyle='#ffb35a'; cx.beginPath(); cx.arc(560,90,34,0,Math.PI*2); cx.fill();
    cx.fillStyle='#c84a20'; cx.beginPath(); cx.arc(170,62,14,0,Math.PI*2); cx.fill();
    cx.globalAlpha=zw[1]*0.18; cx.fillStyle='#ff6a00';
    for(let i=0;i<3;i++) cx.fillRect(0,150+i*22+Math.sin(t*1.3+i)*3,W,5);
    cx.globalAlpha=1;
  }
  // ── Zone3 celestial: alien mothership waiting above ──
  if(zw[2]>0.03){
    cx.globalAlpha=zw[2];
    const mx=W/2+Math.sin(t*0.25)*12, my=58+Math.sin(t*0.5)*4;
    cx.fillStyle='#0e1622'; cx.beginPath(); cx.ellipse(mx,my,190,26,0,0,Math.PI*2); cx.fill();
    cx.fillStyle='#16202e'; cx.beginPath(); cx.ellipse(mx,my-14,95,30,0,0,Math.PI*2); cx.fill();
    cx.fillStyle='rgba(80,255,160,0.5)';
    for(let i=0;i<9;i++){
      const lx=mx-160+i*40;
      cx.globalAlpha=zw[2]*(Math.floor(t*3+i)%3===0?0.9:0.25);
      cx.beginPath(); cx.arc(lx,my+12,4,0,Math.PI*2); cx.fill();
    }
    cx.globalAlpha=zw[2]*0.5; cx.fillStyle='rgba(120,255,180,0.25)';
    cx.beginPath(); cx.ellipse(mx,my+4,200,8,0,0,Math.PI*2); cx.fill();
    cx.globalAlpha=1;
  }

  // ── World props (1:1 scroll) ──
  // Zone1 city
  bldg.forEach(b=>{
    const sx=b.x-camX; if(sx+b.w<-50||sx>W+50)return;
    const by=GL-b.h;
    cx.fillStyle='#0b0418';
    if(b.broken){
      cx.beginPath(); cx.moveTo(sx,GL); cx.lineTo(sx,by+18); cx.lineTo(sx+b.w*0.3,by+6);
      cx.lineTo(sx+b.w*0.55,by+22); cx.lineTo(sx+b.w,by+10); cx.lineTo(sx+b.w,GL); cx.closePath(); cx.fill();
    } else cx.fillRect(sx,by,b.w,b.h);
    let wi=0;
    for(let r2=0;r2<b.rows;r2++) for(let c2=0;c2<b.cols;c2++){
      if(b.win[wi]&&!(b.broken&&r2<2)){
        cx.fillStyle=hsh(b.x+wi)>0.93?'#ff8800':'#ffff44';
        cx.globalAlpha=0.85; cx.fillRect(sx+5+c2*10,by+7+r2*13,6,7); cx.globalAlpha=1;
      }
      wi++;
    }
  });
  // Zone2 mesas
  rocks.forEach(r=>{
    const sx=r.x-camX; if(sx+r.w<-50||sx>W+50)return;
    const ry=GL-r.h;
    cx.fillStyle=r.t>0.5?'#33100a':'#2a0d06';
    cx.beginPath();
    cx.moveTo(sx,GL); cx.lineTo(sx+r.w*0.15,ry+r.h*0.2); cx.lineTo(sx+r.w*0.3,ry);
    cx.lineTo(sx+r.w*0.75,ry+4); cx.lineTo(sx+r.w*0.9,ry+r.h*0.35); cx.lineTo(sx+r.w,GL);
    cx.closePath(); cx.fill();
    cx.fillStyle='rgba(255,120,40,0.12)';
    cx.beginPath(); cx.moveTo(sx+r.w*0.3,ry); cx.lineTo(sx+r.w*0.75,ry+4); cx.lineTo(sx+r.w*0.6,ry+r.h*0.45); cx.lineTo(sx+r.w*0.34,ry+r.h*0.4); cx.closePath(); cx.fill();
  });
  // Zone3 base towers
  towers.forEach(tw=>{
    const sx=tw.x-camX; if(sx+tw.w<-60||sx>W+60)return;
    const ty=GL-tw.h;
    cx.fillStyle='#141a26'; cx.fillRect(sx,ty,tw.w,tw.h);
    cx.fillStyle='#1e2838'; cx.fillRect(sx+4,ty+6,tw.w-8,10);
    cx.fillStyle='#0c1018'; cx.fillRect(sx+6,ty+24,tw.w-12,tw.h-32);
    cx.strokeStyle='#2a3a52'; cx.lineWidth=2;
    cx.beginPath(); cx.moveTo(sx+tw.w/2,ty); cx.lineTo(sx+tw.w/2,ty-22); cx.stroke();
    cx.fillStyle=Math.floor(t*2+tw.lit*9)%2===0?'#ff3333':'#441111';
    cx.beginPath(); cx.arc(sx+tw.w/2,ty-24,3,0,Math.PI*2); cx.fill();
    if(tw.lit>0.6){
      const swing=Math.sin(t*0.7+tw.lit*8)*0.5;
      cx.save(); cx.translate(sx+tw.w/2,ty+10); cx.rotate(swing);
      cx.fillStyle='rgba(140,180,255,0.07)';
      cx.beginPath(); cx.moveTo(0,0); cx.lineTo(-46,150); cx.lineTo(46,150); cx.closePath(); cx.fill();
      cx.restore();
    }
  });

  // ── Ground ──
  const gg=cx.createLinearGradient(0,GL,0,H);
  gg.addColorStop(0,mix3(GND_T,zw)); gg.addColorStop(0.35,mix3(GND_M,zw)); gg.addColorStop(1,mix3(GND_B,zw));
  cx.fillStyle=gg; cx.fillRect(0,GL,W,H-GL);
  cx.strokeStyle='rgba(120,90,60,0.55)'; cx.lineWidth=3;
  cx.beginPath(); cx.moveTo(0,GL); cx.lineTo(W,GL); cx.stroke();
  // ground detail: cracks (z1/z2)
  const i0=Math.floor(camX/173);
  for(let i=i0;i<i0+7;i++){
    const wx=i*173+hsh(i)*60, sx=wx-camX;
    const yy=GL+8+hsh(i+4)*70;
    if(wx<Z2-200){
      cx.strokeStyle='rgba(60,32,16,0.8)'; cx.lineWidth=1.5;
      cx.beginPath(); cx.moveTo(sx,yy); cx.quadraticCurveTo(sx+45,yy-7,sx+90,yy+12); cx.stroke();
      if(wx>Z1-300&&hsh(i+11)>0.6){ // bones in desert
        cx.strokeStyle='rgba(200,190,160,0.35)'; cx.lineWidth=2;
        cx.beginPath(); cx.arc(sx+40,yy+18,7,Math.PI,Math.PI*2); cx.stroke();
      }
    }
  }
  // metal floor lines in zone3
  if(zw[2]>0.05){
    cx.globalAlpha=zw[2];
    cx.strokeStyle='rgba(90,110,150,0.3)'; cx.lineWidth=1.5;
    const p0=Math.floor(camX/120);
    for(let i=p0;i<p0+8;i++){
      const sx=i*120-camX;
      cx.beginPath(); cx.moveTo(sx,GL); cx.lineTo(sx-26,H); cx.stroke();
    }
    cx.beginPath(); cx.moveTo(0,GL+40); cx.lineTo(W,GL+40); cx.stroke();
    cx.globalAlpha=1;
  }
}

function drawUFO(x,y,t) {
  const bg=cx.createLinearGradient(0,y+18,0,y+95);
  bg.addColorStop(0,'rgba(80,255,160,0.28)'); bg.addColorStop(1,'rgba(80,255,160,0)');
  cx.fillStyle=bg;
  cx.beginPath(); cx.moveTo(x-12,y+18); cx.lineTo(x-35,y+95); cx.lineTo(x+35,y+95); cx.lineTo(x+12,y+18);
  cx.closePath(); cx.fill();
  const dg=cx.createLinearGradient(0,y+5,0,y+22);
  dg.addColorStop(0,'#999'); dg.addColorStop(1,'#555');
  cx.fillStyle=dg; cx.beginPath(); cx.ellipse(x,y+14,40,11,0,0,Math.PI*2); cx.fill();
  cx.fillStyle='#bbb'; cx.beginPath(); cx.ellipse(x,y+8,20,15,0,0,Math.PI*2); cx.fill();
  const cg=cx.createRadialGradient(x-5,y+2,2,x,y+6,18);
  cg.addColorStop(0,'rgba(140,255,210,0.45)'); cg.addColorStop(1,'rgba(0,70,70,0.25)');
  cx.fillStyle=cg; cx.beginPath(); cx.ellipse(x,y+8,17,13,0,0,Math.PI*2); cx.fill();
  const lc=['#ff2222','#ffee00','#22ff88','#2288ff'];
  for(let i=0;i<4;i++){
    const a=-Math.PI*0.55+i*0.37;
    cx.fillStyle=Math.floor(t*2.8+i)%4===i?lc[i]:'#333';
    cx.beginPath(); cx.arc(x+Math.cos(a)*30,y+14+Math.sin(a)*6,3.5,0,Math.PI*2); cx.fill();
  }
}

// ═══ BACKGROUND V2 — hand-drawn cartoon look (overrides drawBG above) ═══
const clouds2=Array.from({length:6},(_,i)=>({x:hsh(i+40)*W, y:26+hsh(i+43)*95, s:0.6+hsh(i+47)*0.9, v:0.5+hsh(i+45)*0.8}));
const houses=[];
(function(){
  const HB=['#8c4d62','#6a5a96','#4f6e8c','#8a6a44','#5f7d52'];
  const HR=['#4f2435','#3a3060','#2c4356','#544022','#37502f'];
  let hx=-60,hi=0;
  while(hx<Z1+150){
    const ci=Math.floor(hsh(hi)*5);
    houses.push({x:hx,w:52+hsh(hi+1)*42,h:36+hsh(hi+2)*26,body:HB[ci],roof:HR[ci],
      lit:hsh(hi+5)>0.3,chim:hsh(hi+6)>0.5,broken:hsh(hi+8)>0.78});
    hx+=85+hsh(hi+3)*95; hi++;
  }
})();
const poles2=[];
(function(){ let px=Z1+120, i=0; while(px<Z2-150){poles2.push(px); px+=300+hsh(i+60)*120; i++;} })();
const cacti2=[];
(function(){ let cp=Z1+260, i=0; while(cp<Z2-200){ if(hsh(i+70)>0.4)cacti2.push({x:cp,s:0.8+hsh(i+71)*0.6}); cp+=260+hsh(i+72)*200; i++; } })();
const cars2=[{x:4250,f:1},{x:5680,f:-1}];

  cx.beginPath(); cx.moveTo(sx,sy); cx.lineTo(ex,ey); cx.stroke();
  cx.lineWidth=w2+4.6;
  cx.beginPath(); cx.moveTo(ex,ey); cx.lineTo(fx,fy); cx.stroke();
  // fill
  cx.strokeStyle=col;
  cx.lineWidth=w;
  cx.beginPath(); cx.moveTo(sx,sy); cx.lineTo(ex,ey); cx.stroke();
  cx.lineWidth=w2;
  cx.beginPath(); cx.moveTo(ex,ey); cx.lineTo(fx,fy); cx.stroke();
  // joint cap
  cx.fillStyle=col;
  cx.beginPath(); cx.arc(ex,ey,w*0.46,0,Math.PI*2); cx.fill();
  // rim highlight along upper segment
  const hx2=Math.cos(a1)*w*0.24, hy2=-Math.sin(a1)*w*0.24;
  cx.strokeStyle='rgba(255,255,255,0.22)'; cx.lineWidth=Math.max(1.4,w*0.22);
  cx.beginPath(); cx.moveTo(sx+hx2,sy+hy2); cx.lineTo(ex+hx2,ey+hy2); cx.stroke();
  return [ex,ey,fx,fy];
}
function fistAt(fx,fy,r,col){
  cx.fillStyle=col;
  cx.beginPath(); cx.arc(fx,fy,r,0,Math.PI*2); cx.fill();
  cx.strokeStyle='#241200'; cx.lineWidth=2.8; cx.stroke();
  // form shade (lower-right)
  cx.fillStyle='rgba(36,18,0,0.18)';
  cx.beginPath(); cx.arc(fx+r*0.22,fy+r*0.26,r*0.72,0,Math.PI*2); cx.fill();
  // knuckle creases
  cx.strokeStyle='rgba(36,18,0,0.5)'; cx.lineWidth=1.5;
  cx.beginPath(); cx.arc(fx-r*0.35,fy+r*0.45,r*0.3,Math.PI*0.95,Math.PI*1.9); cx.stroke();
  cx.beginPath(); cx.arc(fx+r*0.2,fy+r*0.5,r*0.3,Math.PI*0.95,Math.PI*1.9); cx.stroke();
  // highlight
  cx.fillStyle='rgba(255,255,255,0.45)';
  cx.beginPath(); cx.arc(fx-r*0.35,fy-r*0.38,r*0.3,0,Math.PI*2); cx.fill();
}
function shoeAt(fx,fy,col){
  cx.save(); cx.translate(fx,fy-2);
  cx.beginPath();
  cx.moveTo(-8,-5);
  cx.quadraticCurveTo(-11,2,-6,4);
  cx.lineTo(10,4);
  cx.quadraticCurveTo(16,4,15,-1);
  cx.quadraticCurveTo(14,-5,7,-6);
  cx.closePath();
  cx.fillStyle=col; cx.fill();
  cx.strokeStyle='#241200'; cx.lineWidth=2.8; cx.stroke();
  // sole line
  cx.strokeStyle='rgba(255,255,255,0.32)'; cx.lineWidth=1.7;
  cx.beginPath(); cx.moveTo(-6,1.6); cx.lineTo(11,1.6); cx.stroke();
  // toe shade
  cx.fillStyle='rgba(36,18,0,0.22)';
  cx.beginPath(); cx.ellipse(9,-1,4.5,3,0,0,Math.PI*2); cx.fill();
  cx.restore();
}

function drawAlien(x,y,facing,state,anim,atkProg) {
  cx.save();
  cx.translate(x,y); cx.scale(facing*HERO_S,HERO_S);
  cx.translate(0,26);           // local ground line
  cx.lineJoin='round'; cx.lineCap='round';

  const isWalk=state==='walk', isA1=state==='attack1', isA2=state==='attack2',
        isCmb=state==='combo', isHurt=state==='hurt';
  const isA4=state==='attack4', isA5=state==='attack5', isA6=state==='attack6', isA7=state==='attack7';
  const isA8=state==='attack8', isA9=state==='attack9';
  const isIdle=!isWalk&&!isA1&&!isA2&&!isCmb&&!isHurt&&!isA4&&!isA5&&!isA6&&!isA7&&!isA8&&!isA9;
  const wc=isWalk?Math.sin(anim*10):0;
  const breath=isIdle?Math.sin(anim*2.6):0;
  if(isHurt&&Math.floor(anim*28)%2===0) cx.filter='brightness(8) saturate(0)';

  const BODY='#FFD700', SHADE='#E0A900', GLOVE='#E65100', SHOE='#8E2424', ACC='#9C27B0';
  const ease=t=>t<0.5?2*t*t:-1+(4-2*t)*t;
  const c01=v=>clamp(v,0,1);

  // ── pose as a function of attack progress ──
  // fa/ba: front/back arm (shoulder angle, elbow bend)
  // flA,flB / blA,blB: front/back leg (hip angle, knee bend)
  function pose(pg){
    let p={fa1:0.16,fa2:0.45+breath*0.06, ba1:-0.16,ba2:0.45,
           flA:0.06,flB:0.06, blA:-0.06,blB:0.06,
           rot:0,ox:0,oy:-breath*1.2,str:1,headTilt:0};
    if(isWalk){
      p.fa1=0.55*wc; p.fa2=0.5; p.ba1=-0.55*wc; p.ba2=0.5;
      p.flA=0.55*wc; p.flB=c01(wc)*0.9;
      p.blA=-0.55*wc; p.blB=c01(-wc)*0.9;
      p.rot=-0.05; p.oy=-Math.abs(wc)*1.6;
    }
    if(isA1){ // straight jab: arm shoots horizontally forward
      const e=pg<0.35?pg/0.35:1-(pg-0.35)/0.65;
      const es=e*e*(3-2*e);
      p.fa1=lerp(0.2,1.62,es); p.fa2=lerp(0.5,0,es); p.str=1+0.3*es;
      p.ba1=0.45; p.ba2=2.1;                       // guard up
      p.flA=0.5*es; p.flB=0.6*es; p.blA=-0.65*es; p.blB=0.1;
      p.rot=-0.10*es; p.ox=9*es;
    } else if(isA2){ // overhead smash: arm sweeps over the top, down to the ground
      if(pg<0.38){
        const wu=pg/0.38;
        p.fa1=lerp(0.2,-2.7,wu); p.fa2=lerp(0.5,-0.4,wu);
        p.ba1=lerp(-0.16,0.55,wu); p.ba2=0.3;
        p.rot=-0.22*wu; p.oy=3*wu; p.ox=-6*wu;
        p.flA=0.3*wu; p.flB=0.5*wu; p.blA=-0.35*wu; p.blB=0.15;
        p.headTilt=-0.16*wu;
      } else {
        const s=ease(c01((pg-0.38)/0.26));
        p.fa1=lerp(-2.7,-5.45,s); p.fa2=-0.05; p.str=1+0.45*s;
        p.ba1=lerp(0.55,-0.85,s); p.ba2=0.3;
        p.rot=lerp(-0.22,0.34,s); p.oy=lerp(3,12,s); p.ox=lerp(-6,13,s);
        p.flA=lerp(0.3,0.8,s); p.flB=lerp(0.5,1.05,s);
        p.blA=lerp(-0.35,-0.9,s); p.blB=0.12;
        p.headTilt=lerp(-0.16,0.22,s);
      }
    } else if(isCmb){ // rising uppercut: crouch, then launch up
      if(pg<0.30){
        const wu=pg/0.30;
        p.fa1=lerp(0.2,-0.6,wu); p.fa2=lerp(0.5,-0.9,wu);
        p.ba1=lerp(-0.16,0.5,wu); p.ba2=1.6;
        p.rot=0.2*wu; p.oy=14*wu; p.ox=-7*wu;
        p.flA=0.7*wu; p.flB=1.1*wu; p.blA=-0.5*wu; p.blB=0.9*wu;
        p.headTilt=0.1*wu;
      } else if(pg<0.62){
        const s=ease((pg-0.30)/0.32);
        p.fa1=lerp(-0.6,3.0,s); p.fa2=lerp(-0.9,0,s); p.str=1+0.35*s;
        p.ba1=lerp(0.5,-0.9,s); p.ba2=0.6;
        p.rot=lerp(0.2,-0.3,s);
        p.oy=lerp(14,-30,s); p.ox=lerp(-7,10,s);
        p.flA=lerp(0.7,1.0,s); p.flB=lerp(1.1,1.6,s);
        p.blA=lerp(-0.5,0.45,s); p.blB=lerp(0.9,1.4,s);
        p.headTilt=lerp(0.1,-0.24,s);
      } else {
        const r=(pg-0.62)/0.38;
        p.fa1=lerp(3.0,0.4,r); p.fa2=lerp(0,0.5,r);
        p.ba1=-0.3; p.ba2=0.5;
        p.rot=lerp(-0.3,0,r); p.oy=lerp(-30,0,r); p.ox=lerp(10,2,r);
        p.flA=lerp(1.0,0.1,r); p.flB=lerp(1.6,0.06,r);
        p.blA=lerp(0.45,-0.06,r); p.blB=lerp(1.4,0.06,r);
      }
    } else if(isA4){ // cross: rear arm straight punch, torso twist
      const e4=pg<0.35?pg/0.35:1-(pg-0.35)/0.65;
      const es=e4*e4*(3-2*e4);
      p.ba1=lerp(-0.16,1.72,es); p.ba2=lerp(0.45,0,es);
      p.fa1=0.5; p.fa2=2.0;
      p.flA=0.6*es; p.flB=0.5*es; p.blA=-0.7*es; p.blB=0.1;
      p.rot=-0.14*es; p.ox=11*es;
      p.headTilt=-0.06*es;
    } else if(isA5){ // spin kick: front leg sweeps up horizontally
      const e5=pg<0.4?pg/0.4:1-(pg-0.4)/0.6;
      const es=e5*e5*(3-2*e5);
      p.flA=lerp(0.1,1.78,es); p.flB=0.06;
      p.blA=lerp(-0.06,-0.55,es); p.blB=0.3*es;
      p.fa1=lerp(0.16,-1.2,es); p.fa2=0.35;
      p.ba1=lerp(-0.16,0.95,es); p.ba2=0.4;
      p.rot=-0.2*es; p.oy=-5*es; p.ox=7*es;
      p.headTilt=-0.12*es;
    } else if(isA6){ // tornado: arms straight out
      p.fa1=1.52; p.fa2=0; p.ba1=-1.52; p.ba2=0;
      p.flA=0.18; p.flB=0.25; p.blA=-0.18; p.blB=0.25;
    } else if(isA7){ // energy ball throw
      if(pg<0.4){
        const wu=pg/0.4;
        p.fa1=lerp(0.16,-2.3,wu); p.fa2=lerp(0.45,-0.3,wu);
        p.ba1=lerp(-0.16,0.7,wu); p.ba2=0.6;
        p.rot=0.08*wu; p.ox=-5*wu;
        p.flA=0.2*wu; p.flB=0.3*wu; p.blA=-0.3*wu; p.blB=0.1;
        p.headTilt=0.05*wu;
      } else {
        const rl=ease(c01((pg-0.4)/0.3));
        p.fa1=lerp(-2.3,1.5,rl); p.fa2=lerp(-0.3,0,rl); p.str=1+0.15*rl;
        p.ba1=lerp(0.7,-0.6,rl); p.ba2=0.5;
        p.rot=lerp(0.08,-0.12,rl); p.ox=lerp(-5,9,rl);
        p.flA=0.55*rl; p.flB=0.4*rl; p.blA=-0.6*rl; p.blB=0.1;
        p.headTilt=lerp(0.05,-0.08,rl);
      }
    } else if(isA8){ // finisher: leap up, two-fist hammer down
      if(pg<0.34){
        const wu=pg/0.34;
        p.fa1=lerp(0.2,-2.9,wu); p.fa2=-0.2; p.ba1=lerp(-0.16,-2.7,wu); p.ba2=-0.2;
        p.oy=lerp(0,-16,wu); p.rot=-0.1*wu; p.headTilt=-0.18*wu;
        p.flA=0.3*wu; p.flB=0.6*wu; p.blA=-0.3*wu; p.blB=0.6*wu;
      } else {
        const s=ease(c01((pg-0.34)/0.3));
        p.fa1=lerp(-2.9,-5.6,s); p.fa2=-0.05; p.ba1=lerp(-2.7,-5.4,s); p.ba2=-0.05; p.str=1+0.5*s;
        p.oy=lerp(-16,14,s); p.rot=lerp(-0.1,0.3,s); p.headTilt=lerp(-0.18,0.26,s);
        p.flA=lerp(0.3,0.9,s); p.flB=lerp(0.6,1.1,s); p.blA=lerp(-0.3,-0.95,s); p.blB=0.12;
      }
    } else if(isA9){ // earthquake: crouch then double-fist ground pound
      if(pg<0.45){
        const wu=pg/0.45;
        p.fa1=lerp(0.2,-1.9,wu); p.fa2=lerp(0.45,-0.3,wu); p.ba1=lerp(-0.16,-1.7,wu); p.ba2=-0.3;
        p.oy=lerp(0,8,wu); p.flA=0.5*wu; p.flB=1.0*wu; p.blA=-0.5*wu; p.blB=1.0*wu; p.headTilt=0.12*wu;
      } else {
        const s=ease(c01((pg-0.45)/0.22));
        p.fa1=lerp(-1.9,1.0,s); p.fa2=lerp(-0.3,0.2,s); p.ba1=lerp(-1.7,0.9,s); p.ba2=0.2; p.str=1+0.2*s;
        p.oy=lerp(8,2,s); p.flA=lerp(0.5,0.2,s); p.flB=lerp(1.0,0.3,s); p.blA=lerp(-0.5,-0.2,s); p.blB=lerp(1.0,0.3,s);
      }
    } else if(isHurt){
      p.fa1=-0.9; p.fa2=-0.5; p.ba1=-0.7; p.ba2=-0.4;
      p.rot=-0.18; p.headTilt=-0.22;
    }
    return p;
  }
  const PS=pose(atkProg);
  const fpos=p=>{
    const ex=13+Math.sin(p.fa1)*14, ey=-52+Math.cos(p.fa1)*14;
    return [ex+Math.sin(p.fa1+p.fa2)*13*p.str, ey+Math.cos(p.fa1+p.fa2)*13*p.str];
  };

  // shadow (stays on the ground)
  cx.fillStyle='rgba(0,0,0,0.3)';
  cx.beginPath(); cx.ellipse(PS.ox*0.6,1,20+Math.abs(PS.oy)*0.3,5,0,0,Math.PI*2); cx.fill();

  // smash: ground dust + shock arc at impact
  if(isA2&&atkProg>0.55&&atkProg<0.88){
    const dp=(atkProg-0.55)/0.33;
    cx.globalAlpha=(1-dp)*0.85;
    cx.fillStyle='#d8b06a';
    for(let i=0;i<4;i++){
      cx.beginPath(); cx.arc(28+i*9,-3-dp*(7+i*5),4.5-i*0.7,0,Math.PI*2); cx.fill();
    }
    cx.strokeStyle='#FFB300'; cx.lineWidth=3.5;
    cx.beginPath(); cx.arc(36,-2,7+dp*24,Math.PI*1.02,Math.PI*1.98); cx.stroke();
    cx.globalAlpha=1;
  }
  // finisher / earthquake: heavy ground shock at impact
  if((isA8||isA9)&&atkProg>0.5&&atkProg<0.92){
    const dp=(atkProg-0.5)/0.42;
    cx.globalAlpha=(1-dp)*0.9;
    cx.strokeStyle=isA9?'#FF7043':'#FF5252'; cx.lineWidth=4.5;
    cx.beginPath(); cx.arc(isA9?0:26,-2,12+dp*46,Math.PI*1.02,Math.PI*1.98); cx.stroke();
    cx.strokeStyle='#FFD54F'; cx.lineWidth=2.5;
    cx.beginPath(); cx.arc(isA9?0:26,-2,6+dp*30,Math.PI*1.05,Math.PI*1.95); cx.stroke();
    cx.fillStyle='#d8b06a';
    for(let i=0;i<5;i++){ cx.beginPath(); cx.arc((isA9?(i-2)*16:26+i*9),-3-dp*(9+i*4),5.5-i*0.6,0,Math.PI*2); cx.fill(); }
    cx.globalAlpha=1;
  }
  // tornado: swirl rings + ground dust
  if(isA6 && atkProg>0.12 && atkProg<0.88){
    const sp2=atkProg*24;
    cx.globalAlpha=0.55; cx.strokeStyle='#FFD700'; cx.lineWidth=4; cx.lineCap='round';
    for(let ri=0;ri<3;ri++){
      cx.beginPath(); cx.arc(0,-44,48-ri*9,sp2+ri*2.1,sp2+ri*2.1+Math.PI*1.2); cx.stroke();
    }
    cx.globalAlpha=0.35; cx.strokeStyle='#fff'; cx.lineWidth=2;
    cx.beginPath(); cx.arc(0,-44,56,-sp2,-sp2+Math.PI*0.9); cx.stroke();
    cx.globalAlpha=0.35; cx.fillStyle='#cbb27a';
    cx.beginPath(); cx.ellipse(0,1,30,6,0,0,Math.PI*2); cx.fill();
    cx.globalAlpha=1;
  }

  // ── body frame (rotates about the hips) ──
  cx.save();
  cx.translate(PS.ox,PS.oy-30); cx.rotate(PS.rot); cx.translate(0,30);

  // back arm (cross punch arm is drawn in front instead, see below)
  if(!isA4){
    limb2(-13,-52,PS.ba1,13,PS.ba2,12,9,SHADE);
    const bx2=-13+Math.sin(PS.ba1)*13, by2=-52+Math.cos(PS.ba1)*13;
    fistAt(bx2+Math.sin(PS.ba1+PS.ba2)*12,by2+Math.cos(PS.ba1+PS.ba2)*12,7.5,'#C24E00');
  }
  // back leg
  {const r2=limb2(-6,-30,PS.blA,15,-PS.blB,13,10,SHADE);
   shoeAt(r2[2],r2[3],'#6E1B1B');}

  // torso (bean shape)
  cx.beginPath();
  cx.moveTo(-15,-57);
  cx.quadraticCurveTo(-22,-46,-19,-31);
  cx.quadraticCurveTo(0,-23,19,-31);
  cx.quadraticCurveTo(22,-46,15,-57);
  cx.quadraticCurveTo(0,-64,-15,-57);
  cx.closePath();
  cx.fillStyle=BODY; cx.fill();
  cx.strokeStyle='#241200'; cx.lineWidth=3; cx.stroke();
  // belly patch
  cx.fillStyle='#FFF3A0';
  cx.beginPath(); cx.ellipse(2,-45,9,7.5,0,0,Math.PI*2); cx.fill();
  cx.strokeStyle='rgba(36,18,0,0.45)'; cx.lineWidth=1.6; cx.stroke();
  // alien chest glyph
  cx.strokeStyle=ACC; cx.lineWidth=2;
  cx.beginPath(); cx.arc(2,-52,3.6,0,Math.PI*2); cx.stroke();
  cx.beginPath(); cx.moveTo(2,-56); cx.lineTo(2,-48); cx.stroke();
  // belt + shorts + shading (clipped to torso)
  cx.save();
  cx.beginPath();
  cx.moveTo(-15,-57); cx.quadraticCurveTo(-22,-46,-19,-31);
  cx.quadraticCurveTo(0,-23,19,-31); cx.quadraticCurveTo(22,-46,15,-57);
  cx.quadraticCurveTo(0,-64,-15,-57); cx.closePath(); cx.clip();
  cx.fillStyle='#C24E00'; cx.fillRect(-22,-31,44,9);
  cx.fillStyle='#3a2410'; cx.fillRect(-22,-37,44,6);
  cx.fillStyle='#ffc94d'; cx.fillRect(-4,-37.6,8,7.2);
  cx.strokeStyle='#241200'; cx.lineWidth=1.8; cx.strokeRect(-4,-37.6,8,7.2);
  cx.fillStyle='rgba(150,75,0,0.20)';
  cx.beginPath(); cx.ellipse(-13,-42,9,16,-0.12,0,Math.PI*2); cx.fill();
  cx.fillStyle='rgba(255,255,255,0.28)';
  cx.beginPath(); cx.ellipse(7,-57,7,3.4,0.25,0,Math.PI*2); cx.fill();
  cx.restore();
  // re-stroke torso outline
  cx.beginPath();
  cx.moveTo(-15,-57); cx.quadraticCurveTo(-22,-46,-19,-31);
  cx.quadraticCurveTo(0,-23,19,-31); cx.quadraticCurveTo(22,-46,15,-57);
  cx.quadraticCurveTo(0,-64,-15,-57); cx.closePath();
  cx.strokeStyle='#241200'; cx.lineWidth=3.4; cx.stroke();

  // spin kick: foot trail arc
  if(isA5 && atkProg>0.22 && atkProg<0.78){
    cx.save(); cx.translate(6,-30);
    cx.globalAlpha=0.45; cx.strokeStyle='#FF7043'; cx.lineWidth=8; cx.lineCap='round';
    cx.beginPath(); cx.arc(0,0,28,Math.PI/2-0.1,Math.PI/2-PS.flA,true); cx.stroke();
    cx.globalAlpha=0.8; cx.strokeStyle='#FFF3E0'; cx.lineWidth=2.5;
    cx.beginPath(); cx.arc(0,0,32,Math.PI/2-0.1,Math.PI/2-PS.flA,true); cx.stroke();
    cx.restore(); cx.globalAlpha=1;
  }
  // front leg
  {const r2=limb2(6,-30,PS.flA,15,-PS.flB,13,10,BODY);
   shoeAt(r2[2],r2[3],SHOE);
   // spin kick: impact star at the foot
   if(isA5){
     const e5=atkProg<0.4?atkProg/0.4:1-(atkProg-0.4)/0.6;
     if(e5>0.85){
       cx.save(); cx.translate(r2[2]+8,r2[3]); cx.rotate(atkProg*9);
       cx.globalAlpha=0.85; cx.fillStyle='#FFE0B2';
       cx.beginPath();
       for(let i=0;i<6;i++){
         const a=i*Math.PI/3;
         cx.lineTo(Math.cos(a)*13,Math.sin(a)*13);
         cx.lineTo(Math.cos(a+Math.PI/6)*4.5,Math.sin(a+Math.PI/6)*4.5);
       }
       cx.closePath(); cx.fill(); cx.restore(); cx.globalAlpha=1;
     }
   }}

  // ── head (big cartoon head) ──
  cx.save(); cx.translate(3,-62); cx.rotate(PS.headTilt);
  // antenna
  cx.strokeStyle='#241200'; cx.lineWidth=3;
  cx.beginPath(); cx.moveTo(-1,-40); cx.quadraticCurveTo(-4,-50,2,-56); cx.stroke();
  const agl=0.5+0.5*Math.sin(anim*4);
  cx.globalAlpha=0.35*agl; cx.fillStyle='#CE93D8';
  cx.beginPath(); cx.arc(3,-58,10,0,Math.PI*2); cx.fill();
  cx.globalAlpha=1;
  cx.fillStyle=ACC; cx.beginPath(); cx.arc(3,-58,5,0,Math.PI*2); cx.fill();
  cx.strokeStyle='#241200'; cx.lineWidth=2.4; cx.stroke();
  cx.fillStyle='rgba(255,255,255,0.55)';
  cx.beginPath(); cx.arc(1.5,-59.5,1.5,0,Math.PI*2); cx.fill();
  // skull (bigger, with cel shade + sheen)
  cx.beginPath(); cx.ellipse(0,-19,26,23,0,0,Math.PI*2);
  cx.fillStyle=BODY; cx.fill();
  cx.strokeStyle='#241200'; cx.lineWidth=3.4; cx.stroke();
  cx.save();
  cx.beginPath(); cx.ellipse(0,-19,26,23,0,0,Math.PI*2); cx.clip();
  cx.fillStyle='rgba(150,75,0,0.16)';
  cx.beginPath(); cx.ellipse(-11,-9,22,14,0.25,0,Math.PI*2); cx.fill();
  cx.fillStyle='rgba(255,255,255,0.30)';
  cx.beginPath(); cx.ellipse(8,-35,11,5,0.3,0,Math.PI*2); cx.fill();
  cx.restore();
  // face
  const atk=isA1||isA2||isCmb||isA4||isA5||isA6||isA7;
  cx.fillStyle='rgba(255,250,220,0.5)';
  cx.beginPath(); cx.ellipse(1,-20,18,12,0,0,Math.PI*2); cx.fill();
  [[-9.5],[11]].forEach(([exo])=>{
    cx.fillStyle='#fff';
    cx.beginPath(); cx.ellipse(exo,-21,7.4,(isHurt?3.2:9.4),0,0,Math.PI*2); cx.fill();
    cx.strokeStyle='#241200'; cx.lineWidth=2.2; cx.stroke();
    if(!isHurt){

      cx.fillStyle='#1a0022';
      cx.beginPath(); cx.arc(exo+3,-20,2,0,Math.PI*2); cx.fill();
      cx.fillStyle='rgba(255,255,255,0.95)';
      cx.beginPath(); cx.arc(exo+1.2,-23,1.5,0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.arc(exo+4.4,-17.5,0.8,0,Math.PI*2); cx.fill();
      if(atk){

        cx.strokeStyle='#241200'; cx.lineWidth=2;

    }
  });
  if(atk){
    cx.strokeStyle='#241200'; cx.lineWidth=3.2;
    cx.beginPath(); cx.moveTo(-15,-33); cx.lineTo(-4,-29); cx.stroke();
    cx.beginPath(); cx.moveTo(17,-33); cx.lineTo(6,-29); cx.stroke();
  }
  if(isA2&&atkProg>0.3){
    cx.fillStyle='#3a0d00';
    cx.beginPath(); cx.ellipse(4,-4,6,7,0,0,Math.PI*2); cx.fill();
    cx.strokeStyle='#241200'; cx.lineWidth=2; cx.stroke();
    cx.fillStyle='#fff'; cx.fillRect(0,-10,8,3);
  } else if((isA1||isA4||isA5||isA6)&&atkProg>0.1&&atkProg<0.85){
    cx.fillStyle='#3a0d00'; cx.fillRect(-3,-7,12,5);
    cx.strokeStyle='#241200'; cx.lineWidth=1.8; cx.strokeRect(-3,-7,12,5);
    cx.fillStyle='#fff'; cx.fillRect(-2,-6.2,10,1.8);
  } else if(isCmb){
    cx.strokeStyle='#241200'; cx.lineWidth=2.6;
    cx.beginPath(); cx.moveTo(-2,-4); cx.lineTo(10,-5); cx.stroke();
  } else if(isHurt){
    cx.strokeStyle='#241200'; cx.lineWidth=2.4;
    cx.beginPath(); cx.arc(4,-1,4,Math.PI,Math.PI*2); cx.stroke();
  } else {
    cx.strokeStyle='#241200'; cx.lineWidth=2.4;
    cx.beginPath(); cx.arc(4,-7,5.5,0.25,Math.PI*0.78); cx.stroke();
  }
  cx.restore(); // head

  // ── swing trails / ghosts, then front arm ──
  if(isA2&&atkProg>0.40&&atkProg<0.74){
    cx.save(); cx.translate(13,-52);
    cx.globalAlpha=0.5; cx.strokeStyle='#FFB300'; cx.lineWidth=9;
    cx.beginPath(); cx.arc(0,0,27,Math.PI/2+2.7,Math.PI/2-PS.fa1,false); cx.stroke();
    cx.globalAlpha=0.85; cx.strokeStyle='#FFF8E1'; cx.lineWidth=2.5;
    cx.beginPath(); cx.arc(0,0,31,Math.PI/2+2.7,Math.PI/2-PS.fa1,false); cx.stroke();
    cx.restore(); cx.globalAlpha=1;
  }
  if(isCmb&&atkProg>0.34&&atkProg<0.64){
    cx.save(); cx.translate(13,-52);
    cx.globalAlpha=0.5; cx.strokeStyle=ACC; cx.lineWidth=9;
    cx.beginPath(); cx.arc(0,0,27,Math.PI/2+0.6,Math.PI/2-PS.fa1,true); cx.stroke();
    cx.globalAlpha=0.85; cx.strokeStyle='#E1BEE7'; cx.lineWidth=2.5;
    cx.beginPath(); cx.arc(0,0,31,Math.PI/2+0.6,Math.PI/2-PS.fa1,true); cx.stroke();
    cx.restore(); cx.globalAlpha=1;
  }
  if((isA2&&atkProg>0.42&&atkProg<0.8)||(isCmb&&atkProg>0.34&&atkProg<0.66)){
    [0.07,0.14].forEach((lag,gi)=>{
      const g=pose(Math.max(0.01,atkProg-lag));
      cx.globalAlpha=0.26-gi*0.11;
      const gx=13+Math.sin(g.fa1)*14, gy=-52+Math.cos(g.fa1)*14;
      limb2(13,-52,g.fa1,14,g.fa2,13*g.str,9.5,BODY);
      fistAt(gx+Math.sin(g.fa1+g.fa2)*13*g.str,gy+Math.cos(g.fa1+g.fa2)*13*g.str,9,GLOVE);
      cx.globalAlpha=1;
    });
  }
  limb2(13,-52,PS.fa1,14,PS.fa2,13*PS.str,9.5,BODY);
  {
   const fp=fpos(PS), ffx=fp[0], ffy=fp[1];
   fistAt(ffx,ffy,9,GLOVE);
   // ray gun in hand while ammo remains
   const hasGun=typeof player!=='undefined'&&player&&player.ammo>0;
   if(hasGun&&!isA2&&!isCmb&&!isA5&&!isA6){
     cx.save(); cx.translate(ffx+3,ffy); cx.lineJoin='round';
     cx.fillStyle='#3c4250'; rr(-3,-3.5,13,6.5,2);
     cx.strokeStyle='#241200'; cx.lineWidth=1.8; cx.stroke();
     cx.fillStyle='#FFEB3B';
     cx.beginPath(); cx.arc(11,-0.5,3.2,0,Math.PI*2); cx.fill();
     cx.strokeStyle='#241200'; cx.lineWidth=1.5; cx.stroke();
     cx.fillStyle='#ff5252'; cx.fillRect(0,-2,5,1.8);
     cx.restore();
   }
   // energy ball: charging orb in hand, then muzzle flash
   if(isA7&&atkProg<0.42&&!hasGun){
     const ch=atkProg/0.42;
     cx.globalAlpha=0.45+0.3*Math.sin(anim*30);
     cx.fillStyle='#E1BEE7';
     cx.beginPath(); cx.arc(ffx,ffy,10+ch*5,0,Math.PI*2); cx.fill();
     cx.globalAlpha=1;
     cx.fillStyle='#9C27B0';
     cx.beginPath(); cx.arc(ffx,ffy,5+ch*3,0,Math.PI*2); cx.fill();
     cx.fillStyle='rgba(255,255,255,0.9)';
     cx.beginPath(); cx.arc(ffx-2,ffy-2,2,0,Math.PI*2); cx.fill();
   }
   if(isA7&&atkProg>0.42&&atkProg<0.62){
     const mz=(atkProg-0.42)/0.2;
     cx.globalAlpha=(1-mz)*0.8;
     cx.strokeStyle='#CE93D8'; cx.lineWidth=2.5;
     for(let i=-1;i<=1;i++){
       cx.beginPath(); cx.moveTo(ffx+6,ffy+i*7); cx.lineTo(ffx+20+mz*10,ffy+i*10); cx.stroke();
     }
     cx.globalAlpha=1;
   }
   if(isA1){
     const e1=atkProg<0.35?atkProg/0.35:1-(atkProg-0.35)/0.65;
     if(e1>0.5){
       cx.globalAlpha=(e1-0.5)*1.6;
       cx.strokeStyle='#FFF59D'; cx.lineWidth=2.5;
       for(let i=0;i<3;i++){
         cx.beginPath(); cx.moveTo(ffx-26,ffy-8+i*8); cx.lineTo(ffx-9,ffy-8+i*8); cx.stroke();
       }
       cx.globalAlpha=1;
     }
     if(e1>0.85){
       cx.save(); cx.translate(ffx+7,ffy); cx.rotate(atkProg*9);
       cx.globalAlpha=0.85; cx.fillStyle='#fff';
       cx.beginPath();
       for(let i=0;i<6;i++){
         const a=i*Math.PI/3;
         cx.lineTo(Math.cos(a)*13,Math.sin(a)*13);
         cx.lineTo(Math.cos(a+Math.PI/6)*4.5,Math.sin(a+Math.PI/6)*4.5);
       }
       cx.closePath(); cx.fill(); cx.restore(); cx.globalAlpha=1;
     }
   }
   if(isCmb&&atkProg>0.45&&atkProg<0.66){
     const p3=(atkProg-0.45)/0.21;
     cx.globalAlpha=(1-p3)*0.8;
     for(let ri=0;ri<8;ri++){
       const sa=(ri/8)*Math.PI*2;
       cx.strokeStyle=ri%2===0?'#fff':'#CE93D8'; cx.lineWidth=2.5;
       cx.beginPath();
       cx.moveTo(ffx+Math.cos(sa)*9,ffy+Math.sin(sa)*9);
       cx.lineTo(ffx+Math.cos(sa)*(9+p3*26),ffy+Math.sin(sa)*(9+p3*26));
       cx.stroke();
     }
     cx.globalAlpha=1;
   }
  }

  // cross: rear arm punches across the body (drawn in front)
  if(isA4){
    limb2(-13,-52,PS.ba1,13,PS.ba2,12,9.5,BODY);
    const bx2=-13+Math.sin(PS.ba1)*13, by2=-52+Math.cos(PS.ba1)*13;
    const bfx=bx2+Math.sin(PS.ba1+PS.ba2)*12, bfy=by2+Math.cos(PS.ba1+PS.ba2)*12;
    fistAt(bfx,bfy,9,GLOVE);
    const e4=atkProg<0.35?atkProg/0.35:1-(atkProg-0.35)/0.65;
    if(e4>0.5){
      cx.globalAlpha=(e4-0.5)*1.6;
      cx.strokeStyle='#FFE0B2'; cx.lineWidth=2.5;
      for(let i=0;i<3;i++){
        cx.beginPath(); cx.moveTo(bfx-28,bfy-8+i*8); cx.lineTo(bfx-10,bfy-8+i*8); cx.stroke();
      }
      cx.globalAlpha=1;
    }
    if(e4>0.85){
      cx.save(); cx.translate(bfx+8,bfy); cx.rotate(atkProg*9);
      cx.globalAlpha=0.85; cx.fillStyle='#FFECB3';
      cx.beginPath();
      for(let i=0;i<6;i++){
        const a=i*Math.PI/3;
        cx.lineTo(Math.cos(a)*14,Math.sin(a)*14);
        cx.lineTo(Math.cos(a+Math.PI/6)*5,Math.sin(a+Math.PI/6)*5);
      }
      cx.closePath(); cx.fill(); cx.restore(); cx.globalAlpha=1;
    }
  }

  cx.restore(); // body frame
  cx.filter='none';
  cx.restore();
}

// (old angular version kept unused below)
function drawAlienOld(x,y,facing,state,anim,atkProg) {
  cx.save();
  const ds = 0.70 + (y-GT)/(GB-GT)*0.30;
  cx.translate(x,y); cx.scale(facing*ds, ds);
  cx.lineJoin='round'; cx.lineCap='round';

  const isWalk = state==='walk';
  const isA1   = state==='attack1';
  const isA2   = state==='attack2';
  const isCmb  = state==='combo';
  const isHurt = state==='hurt';
  const isIdle = !isWalk&&!isA1&&!isA2&&!isCmb&&!isHurt;

  const wc  = isWalk ? Math.sin(anim*9.5) : 0;
  const breath = isIdle ? Math.sin(anim*2.6) : 0;
  const bob = isWalk ? wc*2.5 : breath*1.4;

  if(isHurt && Math.floor(anim*28)%2===0) cx.filter='brightness(8) saturate(0)';

  const Y1='#FFD700', Y2='#FFF176', Y3='#E65100', Y4='#BF360C';
  const ACC='#AA00FF', OL='rgba(80,30,0,0.5)';
  const ease=t=>t<0.5?2*t*t:-1+(4-2*t)*t;

  // ── whole-body acting: lunge / crouch / squash-stretch ──
  let gOX=0,gOY=0,gRot=0,sqX=1,sqY=1;
  if(isWalk) gRot=-0.045;
  if(isA1){
    const e1=atkProg<0.35?atkProg/0.35:1-(atkProg-0.35)/0.65;
    const es=e1*e1*(3-2*e1);
    gOX=8*es; gRot=-0.07*es; sqX=1+0.03*es; sqY=1-0.03*es;
  } else if(isA2){
    if(atkProg<0.38){
      const wu=atkProg/0.38;
      gOX=-7*wu; gOY=5*wu; gRot=0.12*wu; sqX=1+0.07*wu; sqY=1-0.10*wu;
    } else {
      const sw=ease((atkProg-0.38)/0.62);
      gOX=lerp(-7,14,sw); gOY=lerp(5,-3,sw); gRot=lerp(0.12,-0.16,sw);
      sqX=lerp(1.07,0.96,sw); sqY=lerp(0.90,1.05,sw);
    }
  } else if(isCmb){
    if(atkProg<0.35){
      const wu=atkProg/0.35;
      gOX=-9*wu; gOY=7*wu; gRot=0.10*wu; sqX=1+0.09*wu; sqY=1-0.13*wu;
    } else if(atkProg<0.68){
      const sl=ease((atkProg-0.35)/0.33);
      gOX=lerp(-9,17,sl); gOY=lerp(7,-11,sl); gRot=lerp(0.10,-0.10,sl);
      sqX=lerp(1.09,0.95,sl); sqY=lerp(0.87,1.09,sl);
    } else {
      const rc=(atkProg-0.68)/0.32;
      gOX=lerp(17,2,rc); gOY=lerp(-11,0,rc); gRot=lerp(-0.10,0,rc);
    }
  } else if(isA4){
    const e4=atkProg<0.35?atkProg/0.35:1-(atkProg-0.35)/0.65;
    const es=e4*e4*(3-2*e4);
    gOX=11*es; gRot=-0.13*es; sqX=1+0.04*es; sqY=1-0.04*es;
  } else if(isA5){
    const e5=atkProg<0.4?atkProg/0.4:1-(atkProg-0.4)/0.6;
    const es=e5*e5*(3-2*e5);
    gOX=8*es; gOY=-5*es; gRot=-0.15*es;
  } else if(isA6){
    const sp=atkProg<0.15?atkProg/0.15:atkProg>0.82?(1-atkProg)/0.18:1;
    gOY=2*sp; sqY=1+0.05*sp;
    const flip=Math.cos(atkProg*Math.PI*6);
    sqX=lerp(1,Math.max(0.3,Math.abs(flip))*(flip<0?-1:1),sp);
  } else if(isA7){
    if(atkProg<0.4){
      const wu=atkProg/0.4;
      gOX=-5*wu; gRot=0.08*wu; sqX=1+0.03*wu;
    } else {
      const rl=ease(c01((atkProg-0.4)/0.3));
      gOX=lerp(-5,9,rl); gRot=lerp(0.08,-0.12,rl); sqX=lerp(1.03,0.97,rl);
    }
  }

  // shadow stays on the ground, stretches with the lunge
  cx.fillStyle='rgba(0,0,0,0.3)';
  cx.beginPath(); cx.ellipse(gOX*0.7,13,15+Math.abs(gOX)*0.5+Math.abs(gOY)*0.4,4,0,0,Math.PI*2); cx.fill();

  // haymaker wind-up: foot dust
  if(isA2 && atkProg<0.38){
    cx.globalAlpha=0.4*(atkProg/0.38);
    cx.fillStyle='#caa66f';
    cx.beginPath(); cx.arc(-15,12,3+atkProg*9,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(-22,14,2+atkProg*7,0,Math.PI*2); cx.fill();
    cx.globalAlpha=1;
  }
  // tornado: swirl rings + ground dust
  if(isA6 && atkProg>0.12 && atkProg<0.88){
    const sp2=atkProg*24;
    cx.globalAlpha=0.55; cx.strokeStyle='#FFD700'; cx.lineWidth=4; cx.lineCap='round';
    for(let ri=0;ri<3;ri++){
      cx.beginPath(); cx.arc(0,-42,46-ri*9,sp2+ri*2.1,sp2+ri*2.1+Math.PI*1.2); cx.stroke();
    }
    cx.globalAlpha=0.35; cx.strokeStyle='#fff'; cx.lineWidth=2;
    cx.beginPath(); cx.arc(0,-42,54,-sp2,-sp2+Math.PI*0.9); cx.stroke();
    cx.globalAlpha=0.35; cx.fillStyle='#cbb27a';
    cx.beginPath(); cx.ellipse(0,1,28,6,0,0,Math.PI*2); cx.fill();
    cx.globalAlpha=1;
  }

  cx.save(); // body acting transform
  cx.translate(gOX,gOY); cx.rotate(gRot); cx.scale(sqX,sqY);

  // LEGS
  const legSw = isWalk ? wc*28 : 0;
  let lLeg=0, rLeg=0;
  if(isA2){ lLeg=atkProg<0.4?0.18:-0.08; rLeg=atkProg<0.4?-0.22:0.12; }
  if(isCmb && atkProg>0.18 && atkProg<0.72){ lLeg=-0.55; rLeg=-0.55; }

  [-8, 8].forEach((tx,idx)=>{
    cx.save(); cx.translate(tx, 14+bob);
    cx.rotate((idx===0?-legSw:legSw)*Math.PI/180 + (idx===0?lLeg:rLeg));
    cx.fillStyle=Y3;
    cx.beginPath(); cx.moveTo(-5,0); cx.lineTo(-4,15); cx.lineTo(4,15); cx.lineTo(5,0); cx.closePath(); cx.fill();
    cx.strokeStyle=OL; cx.lineWidth=1.3; cx.stroke();
    cx.fillStyle=Y4;
    cx.beginPath(); cx.moveTo(-6,13); cx.lineTo(-7,20); cx.lineTo(9,20); cx.lineTo(7,13); cx.closePath(); cx.fill();
    cx.strokeStyle='rgba(40,10,0,0.5)'; cx.lineWidth=1.3; cx.stroke();
    cx.beginPath(); cx.moveTo(7,20); cx.lineTo(12,17); cx.lineTo(9,22); cx.closePath(); cx.fill();
    cx.restore();
  });

  // BODY
  let bodyTilt=0;
  if(isA2) bodyTilt = atkProg<0.4 ? -0.28*(atkProg/0.4) : 0.20*((atkProg-0.4)/0.6);

  cx.save(); cx.translate(0,bob); cx.rotate(bodyTilt);

  cx.fillStyle=Y4;
  cx.beginPath(); cx.moveTo(-20,-20); cx.lineTo(-35,-24); cx.lineTo(-28,-36); cx.lineTo(-14,-22); cx.closePath(); cx.fill();
  cx.beginPath(); cx.moveTo(20,-20); cx.lineTo(35,-24); cx.lineTo(28,-36); cx.lineTo(14,-22); cx.closePath(); cx.fill();
  cx.fillStyle=Y3;
  cx.beginPath(); cx.moveTo(-35,-24); cx.lineTo(-28,-36); cx.lineTo(-26,-28); cx.closePath(); cx.fill();
  cx.beginPath(); cx.moveTo(35,-24); cx.lineTo(28,-36); cx.lineTo(26,-28); cx.closePath(); cx.fill();

  const bgr=cx.createLinearGradient(-22,-22,22,-22);
  bgr.addColorStop(0,Y3); bgr.addColorStop(0.5,Y1); bgr.addColorStop(1,Y3);
  cx.fillStyle=bgr;
  cx.beginPath(); cx.moveTo(-20,16); cx.lineTo(-26,2); cx.lineTo(-21,-22);
  cx.lineTo(21,-22); cx.lineTo(26,2); cx.lineTo(20,16); cx.closePath(); cx.fill();
  cx.strokeStyle=OL; cx.lineWidth=1.8; cx.stroke();

  // rim light (top-left edge)
  cx.strokeStyle='rgba(255,255,220,0.5)'; cx.lineWidth=1.5;
  cx.beginPath(); cx.moveTo(-19,-21); cx.lineTo(19,-21); cx.stroke();

  cx.fillStyle=Y2; cx.globalAlpha=0.45;
  cx.beginPath(); cx.moveTo(-10,-20); cx.lineTo(-11,12); cx.lineTo(11,12); cx.lineTo(10,-20); cx.closePath(); cx.fill();
  cx.globalAlpha=1;

  cx.fillStyle=Y4;
  cx.beginPath(); cx.moveTo(-20,10); cx.lineTo(-22,16); cx.lineTo(22,16); cx.lineTo(20,10); cx.closePath(); cx.fill();
  cx.fillStyle=Y1;
  for(let bx=-12;bx<=12;bx+=6){ cx.beginPath(); cx.rect(bx-2,11,4,4); cx.fill(); }

  cx.fillStyle=Y3;
  cx.beginPath(); cx.moveTo(-10,-22); cx.lineTo(-12,-28); cx.lineTo(12,-28); cx.lineTo(10,-22); cx.closePath(); cx.fill();

  // LEFT ARM (counter-jab on A1 second half = one-two punch)
  const armSw = isWalk ? -wc*22 : 0;
  let lAng = armSw*Math.PI/180, lLen=20, lFist=false;
  if(isCmb){
    if(atkProg<0.35) lAng=-0.8*atkProg/0.35;
    else if(atkProg<0.65){ lAng=lerp(-0.8,0.3,(atkProg-0.35)/0.3); lLen=24; }
    else lAng=0.3;
  }
  if(isA1 && atkProg>=0.5){
    const e2=Math.sin((atkProg-0.5)/0.5*Math.PI);
    lAng=-Math.PI*0.45*e2; lLen=20+13*e2; lFist=e2>0.4;
  }
  drawArm(-15,-6,lAng,lLen,Y1,Y2,Y3,lFist,false,ACC);

  // RIGHT ARM — params as a function of progress (for ghost trails)
  function rArm(pg){
    let ang=-armSw*Math.PI/180, len=20, ox=0, oy=0, fist=false, glow=false;
    if(isA1){
      const e = pg<0.35 ? pg/0.35 : 1-(pg-0.35)/0.65;
      const es = e*e*(3-2*e);
      ang = -Math.PI*0.5*es*0.88;
      len = 20+16*es;
      ox  = 5*es;
      fist= es>0.45;
      glow= es>0.65 && es<0.95;
    } else if(isA2){
      if(pg<0.38){
        const wu=pg/0.38;
        ang=0.95*wu; len=20-5*wu; ox=-7*wu; oy=-6*wu;
      } else {
        const sw=(pg-0.38)/0.62;
        const es=ease(sw);
        ang=lerp(0.95,-1.9,es);
        len=20+22*Math.sin(sw*Math.PI*0.82);
        ox=lerp(-7,10,es); oy=lerp(-6,2,es);
        fist=sw>0.18 && sw<0.88;
        glow=sw>0.28 && sw<0.65;
      }
    } else if(isCmb){
      if(pg<0.35){ ang=0.85*pg/0.35; len=20-5*pg/0.35; }
      else if(pg<0.68){
        const sl=(pg-0.35)/0.33;
        const es=ease(sl);
        ang=lerp(0.85,-1.1,es); len=20+24*Math.sin(sl*Math.PI*0.88);
        fist=sl>0.18; glow=sl>0.28 && sl<0.78;
      } else { ang=-1.1; len=20; }
    }
    return {ang,len,ox,oy,fist,glow};
  }
  const ra=rArm(atkProg);

  // ghost afterimages on the big swings
  if((isA2&&atkProg>0.45&&atkProg<0.85)||(isCmb&&atkProg>0.40&&atkProg<0.72)){
    [0.06,0.12].forEach((lag,gi)=>{
      const g=rArm(Math.max(0.01,atkProg-lag));
      drawArm(15+g.ox,-6+g.oy,g.ang,g.len,Y1,Y2,Y3,g.fist,false,ACC,0.28-gi*0.12);
    });
  }
  // haymaker fist trail arc
  if(isA2 && atkProg>0.42 && atkProg<0.74){
    cx.save(); cx.translate(15+ra.ox,-6+ra.oy);
    cx.globalAlpha=0.45;
    cx.strokeStyle='#FFB300'; cx.lineWidth=8;
    cx.beginPath(); cx.arc(0,0,ra.len+5,0.95+Math.PI/2,ra.ang+Math.PI/2,true); cx.stroke();
    cx.globalAlpha=0.7; cx.strokeStyle='#FFF8E1'; cx.lineWidth=2.5;
    cx.beginPath(); cx.arc(0,0,ra.len+10,0.95+Math.PI/2,ra.ang+Math.PI/2,true); cx.stroke();
    cx.restore(); cx.globalAlpha=1;
  }
  drawArm(15+ra.ox,-6+ra.oy,ra.ang,ra.len,Y1,Y2,Y3,ra.fist,ra.glow,ACC);

  cx.restore();

  // HEAD
  const hY = -30+bob;
  let headTilt=0;
  if(isA2 && atkProg>0.38 && atkProg<0.62) headTilt=0.18;
  if(isHurt) headTilt=-0.22;

  cx.save(); cx.translate(2,hY); cx.rotate(headTilt);

  const hg=cx.createLinearGradient(-18,-8,18,8);
  hg.addColorStop(0,Y3); hg.addColorStop(0.45,Y1); hg.addColorStop(1,Y3);
  cx.fillStyle=hg;
  cx.beginPath();
  cx.moveTo(0,-22); cx.lineTo(15,-16); cx.lineTo(20,-4);
  cx.lineTo(16,10); cx.lineTo(5,18); cx.lineTo(-5,18);
  cx.lineTo(-16,10); cx.lineTo(-20,-4); cx.lineTo(-15,-16);
  cx.closePath(); cx.fill();
  cx.strokeStyle=OL; cx.lineWidth=1.8; cx.stroke();

  cx.fillStyle=Y4;
  cx.beginPath();
  cx.moveTo(-20,-4); cx.lineTo(-15,-16); cx.lineTo(-7,-11);
  cx.lineTo(0,-13); cx.lineTo(7,-11); cx.lineTo(15,-16);
  cx.lineTo(20,-4); cx.lineTo(14,-1); cx.lineTo(-14,-1);
  cx.closePath(); cx.fill();
  cx.strokeStyle=Y3; cx.lineWidth=1.5;
  cx.beginPath(); cx.moveTo(-14,-1); cx.lineTo(-7,-11); cx.lineTo(0,-13); cx.lineTo(7,-11); cx.lineTo(14,-1); cx.stroke();

  cx.fillStyle=Y3; cx.globalAlpha=0.3;
  cx.beginPath(); cx.moveTo(-20,-4); cx.lineTo(-16,10); cx.lineTo(-9,8); cx.lineTo(-13,-1); cx.closePath(); cx.fill();
  cx.beginPath(); cx.moveTo(20,-4); cx.lineTo(16,10); cx.lineTo(9,8); cx.lineTo(13,-1); cx.closePath(); cx.fill();
  cx.globalAlpha=1;

  cx.fillStyle=Y4;
  cx.beginPath(); cx.moveTo(-5,18); cx.lineTo(5,18); cx.lineTo(8,12); cx.lineTo(-8,12); cx.closePath(); cx.fill();

  const eo = isHurt?0.4 : (isA2&&atkProg>0.38&&atkProg<0.65)?1.5 : 1;

  cx.fillStyle='#1a0a00';
  cx.beginPath(); cx.moveTo(-17,-9); cx.lineTo(-5,-2); cx.lineTo(-5,4*eo); cx.lineTo(-17,2*eo); cx.closePath(); cx.fill();
  cx.beginPath(); cx.moveTo(5,-2); cx.lineTo(17,-9); cx.lineTo(17,2*eo); cx.lineTo(5,4*eo); cx.closePath(); cx.fill();

  cx.fillStyle=ACC;
  cx.beginPath(); cx.moveTo(-15,-7); cx.lineTo(-7,-2); cx.lineTo(-7,2.5*eo); cx.lineTo(-15,1*eo); cx.closePath(); cx.fill();
  cx.beginPath(); cx.moveTo(7,-2); cx.lineTo(15,-7); cx.lineTo(15,1*eo); cx.lineTo(7,2.5*eo); cx.closePath(); cx.fill();
  cx.globalAlpha=0.3; cx.fillStyle=ACC;
  cx.beginPath(); cx.ellipse(-11,-3,9,7*eo,0.35,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(11,-3,9,7*eo,-0.35,0,Math.PI*2); cx.fill();
  cx.globalAlpha=1;

  cx.fillStyle='#000';
  cx.beginPath(); cx.moveTo(-13,-6); cx.lineTo(-9,-2); cx.lineTo(-9,2*eo); cx.lineTo(-13,0); cx.closePath(); cx.fill();
  cx.beginPath(); cx.moveTo(9,-2); cx.lineTo(13,-6); cx.lineTo(13,0); cx.lineTo(9,2*eo); cx.closePath(); cx.fill();
  cx.fillStyle='rgba(255,255,255,0.75)';
  cx.beginPath(); cx.arc(-14,-7,1.5,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.arc(14,-7,1.5,0,Math.PI*2); cx.fill();

  cx.fillStyle='#3a1a00';
  cx.beginPath(); cx.rect(-4,2,2,5); cx.fill();
  cx.beginPath(); cx.rect(2,2,2,5); cx.fill();

  if(isA2 && atkProg>0.35 && atkProg<0.75){
    cx.fillStyle='#2a0800';
    cx.beginPath(); cx.moveTo(-10,10); cx.lineTo(10,10); cx.lineTo(8,17); cx.lineTo(-8,17); cx.closePath(); cx.fill();
    cx.fillStyle='#fff';
    [[-7,10],[-2,10],[3,10]].forEach(([tx,ty])=>{
      cx.beginPath(); cx.moveTo(tx,ty); cx.lineTo(tx+3,ty); cx.lineTo(tx+1.5,ty+5); cx.closePath(); cx.fill();
    });
  } else if(isCmb && atkProg>0.2 && atkProg<0.78){
    cx.strokeStyle='#3a1a00'; cx.lineWidth=2.5;
    cx.beginPath(); cx.moveTo(-8,13); cx.lineTo(8,13); cx.stroke();
    cx.strokeStyle=Y3; cx.lineWidth=2;
    cx.beginPath(); cx.moveTo(-15,-14); cx.lineTo(-8,-10); cx.stroke();
    cx.beginPath(); cx.moveTo(15,-14); cx.lineTo(8,-10); cx.stroke();
  } else if((isA1||isA4||isA5||isA6) && atkProg>0.12 && atkProg<0.8){
    // gritted teeth shout
    cx.fillStyle='#2a0800'; cx.fillRect(-7,10,14,6);
    cx.fillStyle='#fff'; cx.fillRect(-6,11,12,2);
    cx.strokeStyle='#3a1a00'; cx.lineWidth=1;
    cx.beginPath(); cx.moveTo(-2,10); cx.lineTo(-2,16); cx.moveTo(2,10); cx.lineTo(2,16); cx.stroke();
  } else if(isHurt){
    cx.strokeStyle='#3a1a00'; cx.lineWidth=2;
    cx.beginPath(); cx.arc(0,13,5,Math.PI,Math.PI*2); cx.stroke();
  } else {
    cx.strokeStyle='#3a1a00'; cx.lineWidth=2;
    cx.beginPath(); cx.moveTo(-8,11); cx.lineTo(-4,14); cx.lineTo(4,14); cx.lineTo(8,11); cx.stroke();
  }

  cx.strokeStyle=Y3; cx.lineWidth=3;
  cx.beginPath(); cx.moveTo(3,-22); cx.lineTo(7,-32); cx.lineTo(5,-42); cx.stroke();
  const ag=0.45+0.45*Math.sin(anim*4);
  cx.fillStyle=ACC;
  cx.beginPath(); cx.moveTo(5,-46); cx.lineTo(9,-40); cx.lineTo(1,-40); cx.closePath(); cx.fill();
  cx.globalAlpha=ag*0.45; cx.fillStyle='#CC00FF';
  cx.beginPath(); cx.arc(5,-44,9,0,Math.PI*2); cx.fill();
  cx.globalAlpha=1;

  cx.restore();

  // Attack VFX
  if(isA1 && atkProg>0.12 && atkProg<0.52){
    cx.save(); cx.globalAlpha=(0.52-atkProg)/0.4;
    cx.strokeStyle=Y1; cx.lineWidth=2;
    for(let i=0;i<4;i++){
      cx.beginPath(); cx.moveTo(18+i*5,-12+i*9); cx.lineTo(42+i*7,-10+i*9); cx.stroke();
    }
    cx.restore();
  }
  if(isA2 && atkProg>0.45 && atkProg<0.7){
    const p2=(atkProg-0.45)/0.25;
    cx.save(); cx.globalAlpha=(1-p2)*0.6;
    cx.strokeStyle='#FF6F00'; cx.lineWidth=3.5;
    cx.beginPath(); cx.arc(26,-4,p2*36,0,Math.PI*2); cx.stroke();
    cx.strokeStyle=Y1; cx.lineWidth=1.5;
    cx.beginPath(); cx.arc(26,-4,p2*22,0,Math.PI*2); cx.stroke();
    cx.restore();
  }
  if(isCmb && atkProg>0.42 && atkProg<0.72){
    const p3=(atkProg-0.42)/0.30;
    cx.save(); cx.globalAlpha=(1-p3)*0.75;
    for(let ri=0;ri<10;ri++){
      const sa=(ri/10)*Math.PI*2;
      cx.strokeStyle=ri%3===0?'#fff':ri%3===1?Y1:ACC; cx.lineWidth=2;
      cx.beginPath();
      cx.moveTo(Math.cos(sa)*8,Math.sin(sa)*8);
      cx.lineTo(Math.cos(sa)*(8+p3*36),Math.sin(sa)*(8+p3*36));
      cx.stroke();
    }
    cx.restore();
  }
  // COMBO: rising energy streaks while airborne
  if(isCmb && atkProg>0.38 && atkProg<0.66){
    cx.globalAlpha=0.5;
    cx.strokeStyle='#E1BEE7'; cx.lineWidth=2;
    for(let i=0;i<3;i++){
      const ux=10+i*9;
      cx.beginPath(); cx.moveTo(ux,8-i*4); cx.lineTo(ux-4,34-i*4); cx.stroke();
    }
    cx.globalAlpha=1;
  }
  // JAB: impact star flash at full extension
  if(isA1){
    const e1=atkProg<0.35?atkProg/0.35:1-(atkProg-0.35)/0.65;
    if(e1>0.85){
      cx.save(); cx.translate(56,-4); cx.rotate(atkProg*9);
      cx.globalAlpha=0.8; cx.fillStyle='#fff';
      cx.beginPath();
      for(let i=0;i<6;i++){
        const a=i*Math.PI/3;
        cx.lineTo(Math.cos(a)*12,Math.sin(a)*12);
        cx.lineTo(Math.cos(a+Math.PI/6)*4,Math.sin(a+Math.PI/6)*4);
      }
      cx.closePath(); cx.fill();
      cx.restore();
    }
  }

  cx.restore(); // body acting transform
  cx.filter='none'; cx.restore();
}

function drawArm(ox,oy,ang,len,C1,C2,C3,fist,glow,acc,baseA=1) {
  cx.save(); cx.translate(ox,oy); cx.rotate(ang);
  cx.lineJoin='round'; cx.globalAlpha=baseA;
  cx.fillStyle=C1;
  cx.beginPath(); cx.moveTo(-6,0); cx.lineTo(-5,len); cx.lineTo(5,len); cx.lineTo(6,0); cx.closePath(); cx.fill();
  cx.strokeStyle='rgba(80,30,0,0.5)'; cx.lineWidth=1.4; cx.stroke();
  // highlight strip
  cx.fillStyle='rgba(255,255,255,0.22)';
  cx.beginPath(); cx.moveTo(-4,2); cx.lineTo(-3.5,len-3); cx.lineTo(-1,len-3); cx.lineTo(-1.5,2); cx.closePath(); cx.fill();
  cx.fillStyle=C3;
  cx.beginPath(); cx.moveTo(-6,len-3); cx.lineTo(-7,len+4); cx.lineTo(7,len+4); cx.lineTo(6,len-3); cx.closePath(); cx.fill();
  if(fist){
    cx.fillStyle=C3;
    cx.beginPath();
    cx.moveTo(-7,len+2); cx.lineTo(-9,len+6); cx.lineTo(-8,len+13);
    cx.lineTo(8,len+13); cx.lineTo(9,len+6); cx.lineTo(7,len+2);
    cx.closePath(); cx.fill();
    cx.strokeStyle='rgba(40,10,0,0.6)'; cx.lineWidth=1.4; cx.stroke();
    // knuckle spikes (punch direction)
    cx.fillStyle=C1;
    [-6,-1,4].forEach(kx=>{
      cx.beginPath(); cx.moveTo(kx,len+13); cx.lineTo(kx+1.5,len+17.5); cx.lineTo(kx+3,len+13); cx.closePath(); cx.fill();
    });
    cx.fillStyle=C2; cx.globalAlpha=0.6*baseA;
    [-5,-1,3].forEach(kx=>{
      cx.beginPath(); cx.rect(kx,len+3,3,4); cx.fill();
    });
    cx.globalAlpha=baseA;
  } else {
    cx.fillStyle=C2;
    cx.beginPath(); cx.moveTo(-5,len+3); cx.lineTo(-6,len+10); cx.lineTo(6,len+10); cx.lineTo(5,len+3); cx.closePath(); cx.fill();
    cx.fillStyle=C1;
    [-4,0,4].forEach(fx=>{
      cx.beginPath(); cx.moveTo(fx,len+9); cx.lineTo(fx-1,len+14); cx.lineTo(fx+3,len+14); cx.lineTo(fx+2,len+9); cx.closePath(); cx.fill();
    });
  }
  if(glow){
    cx.globalAlpha=0.65*baseA; cx.fillStyle='#fffde7';
    cx.beginPath(); cx.arc(0,len+5,14,0,Math.PI*2); cx.fill();
  }
  cx.restore();
}

// ── Draw: Astronaut (zone1 mob, screen coords) ──────────
function drawHuman(x,y,facing,state,anim,hp,maxHp,isFlying,flyAng) {
  cx.save();

  if(isFlying) cx.rotate(flyAng);
  cx.scale(facing*ds,ds);

  const isWalk=state==='walk', isDead=state==='dead';
  const isHurt=state==='hurt', isAtk=state==='attack';

  if(!isFlying){cx.fillStyle='rgba(0,0,0,0.28)';cx.beginPath();cx.ellipse(0,6,14,4,0,0,Math.PI*2);cx.fill();}

  const SU='#d0d0e4', DK='#8888aa', HE='#ccccde', VI='#1e3050';

  if(isDead){
    cx.save(); cx.rotate(Math.PI/2);
    cx.fillStyle=SU; cx.beginPath(); cx.ellipse(0,-4,18,10,0,0,Math.PI*2); cx.fill();
    cx.fillStyle=HE; cx.beginPath(); cx.arc(22,-3,12,0,Math.PI*2); cx.fill();
    cx.fillStyle=VI; cx.beginPath(); cx.ellipse(22,-4,9,7,0,0,Math.PI*2); cx.fill();
    cx.globalAlpha=0.8; cx.fillStyle='#FFD700';
    for(let si=0;si<3;si++){
      const sa=(si/3)*Math.PI*2+anim*3;
      cx.beginPath(); cx.arc(22+Math.cos(sa)*16,-3+Math.sin(sa)*10,2.5,0,Math.PI*2); cx.fill();
    }
    cx.globalAlpha=1;
    cx.restore();
  } else {
    const legS=wc*22;
    [[-7,-legS],[7,legS]].forEach(([tx,ang])=>{
      cx.save(); cx.translate(tx,bob); cx.rotate(ang*Math.PI/180);
      cx.fillStyle=DK; cx.fillRect(-5,0,10,20);
      cx.fillStyle='#555'; cx.fillRect(-6,17,13,8);
      cx.restore();
    });
    cx.fillStyle=SU; rr(-13,-30+bob,26,32,4);
    cx.strokeStyle='#15131f'; cx.lineWidth=2.4; cx.lineJoin='round'; cx.stroke();
    cx.fillStyle='#cc2200'; cx.fillRect(-5,-22+bob,10,7);

    const aS=wc*16;

    [[-16,aS+atkOff],[16,-(aS+atkOff)]].forEach(([tx,ang])=>{
      cx.save(); cx.translate(tx,-22+bob); cx.rotate(ang*Math.PI/180);
      cx.fillStyle=DK; cx.fillRect(-5,0,10,20);
      cx.fillStyle=SU; cx.beginPath(); cx.arc(0,21,5,0,Math.PI*2); cx.fill();
      cx.restore();
    });

    cx.fillStyle=HE; cx.beginPath(); cx.arc(0,-46+bob,15,0,Math.PI*2); cx.fill();
    cx.strokeStyle='#15131f'; cx.lineWidth=2.4; cx.stroke();
    cx.fillStyle=VI; cx.beginPath(); cx.ellipse(1,-46+bob,11,9,0,0,Math.PI*2); cx.fill();
    cx.fillStyle='rgba(80,140,255,0.22)'; cx.beginPath(); cx.ellipse(-2,-50+bob,5,4,-0.25,0,Math.PI*2); cx.fill();

    const eyeScale=isHurt?1.6:1;
    cx.fillStyle='#ff7700';
    cx.beginPath(); cx.arc(-4,-47+bob,2.5*eyeScale,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.arc(6,-47+bob,2.5*eyeScale,0,Math.PI*2); cx.fill();

    if(isHurt||isAtk){
      cx.fillStyle='rgba(100,200,255,0.7)';
      cx.beginPath(); cx.ellipse(-14,-40+bob,2,4,0.3,0,Math.PI*2); cx.fill();
    }
    cx.fillStyle=DK; cx.fillRect(-5,-28+bob,10,18);
  }

  cx.filter='none'; cx.restore();
  drawMobHp(x,y,hp,maxHp,isDead,isFlying);
}

    }
    cx.globalAlpha=1; cx.restore();
  } else {
    const legS=wc*24;
    [[-7,-legS],[7,legS]].forEach(([tx,ang])=>{
      cx.save(); cx.translate(tx,bob); cx.rotate(ang*Math.PI/180);
      cx.fillStyle=A2; cx.fillRect(-5,0,10,20);
      cx.fillStyle='#222'; cx.fillRect(-6,17,13,8);

    });
    cx.fillStyle=AR; rr(-14,-32+bob,28,34,5);
    cx.strokeStyle='#0c1408'; cx.lineWidth=2.4; cx.lineJoin='round'; cx.stroke();
    cx.fillStyle=PD; rr(-10,-28+bob,20,14,3);
    cx.fillStyle=VS; cx.fillRect(-3,-26+bob,6,3);
    cx.fillStyle=A2;
    rr(-22,-34+bob,10,12,3); rr(12,-34+bob,10,12,3);
    const aS=wc*18;
    let atkOff=isAtk?Math.sin(anim*18)*32:0;
    [[-17,aS+atkOff,false],[17,-(aS+atkOff),true]].forEach(([tx,ang,baton])=>{
      cx.save(); cx.translate(tx,-24+bob); cx.rotate(ang*Math.PI/180);
      cx.fillStyle=A2; cx.fillRect(-5,0,10,18);
      cx.fillStyle=PD; cx.beginPath(); cx.arc(0,19,5,0,Math.PI*2); cx.fill();
      if(baton){
        cx.strokeStyle=VS; cx.lineWidth=4; cx.shadowColor=VS; cx.shadowBlur=isAtk?12:5;
        cx.beginPath(); cx.moveTo(0,20); cx.lineTo(0,40); cx.stroke();
        cx.shadowBlur=0;
      }
      cx.restore();
    });
    cx.fillStyle=A2;
    cx.beginPath(); cx.moveTo(-12,-40+bob); cx.lineTo(-10,-56+bob); cx.lineTo(10,-56+bob); cx.lineTo(12,-40+bob); cx.lineTo(0,-36+bob); cx.closePath(); cx.fill();
    cx.strokeStyle='#0c1408'; cx.lineWidth=2.4; cx.lineJoin='round'; cx.stroke();
    cx.fillStyle=VS; cx.shadowColor=VS; cx.shadowBlur=isAtk?10:4;
    cx.fillRect(-8,-49+bob,16,4);
    cx.shadowBlur=0;
    cx.fillStyle=PD;
    cx.beginPath(); cx.moveTo(0,-56+bob); cx.lineTo(2,-62+bob); cx.lineTo(4,-56+bob); cx.closePath(); cx.fill();
    cx.fillStyle=A2; cx.fillRect(-5,-38+bob,10,8);
  }
  cx.filter='none'; cx.restore();
  drawMobHp(x,y,hp,maxHp,isDead,isFlying);
}

function drawMobHp(x,y,hp,maxHp,isDead,isFlying){
  if(isDead||isFlying)return;
  const ds2=1.05;
  const bw=36*ds2,bh=5*ds2,bx=x-bw/2,by=y-72*ds2;
  const hr=Math.max(0,hp/maxHp);
  cx.fillStyle='#333'; cx.fillRect(bx,by,bw,bh);
  cx.fillStyle=hr>0.5?'#4CAF50':hr>0.25?'#FF9800':'#F44336';
  cx.fillRect(bx,by,bw*hr,bh);
  cx.strokeStyle='#555'; cx.lineWidth=1; cx.strokeRect(bx,by,bw,bh);
}

// ── Boss drawing ─────────────────────────────────────────
function bossPose(b){
  let aA=0, lift=0;
  if(b.state==='windup'){
    const p=1-b.t/b.wuT;
    if(b.next==='slam') lift=-2.2*p; else aA=1.0*p;
  } else if(b.state==='slam'){
    lift = b.t>14 ? -2.4 : 0.55;
  } else if(b.state==='dash'){
    aA=-1.5;
  } else if(b.state==='recover'){
    aA=-0.2; lift=0.1;
  }
  return {aA,lift};
}

function drawBoss(b){
  const sx=b.x-camX;
  // dive target marker (dodge cue)
  if((b.state==='jump'||b.state==='dive')&&b.tgx!=null){
    const mx=b.tgx-camX;
    cx.save(); cx.globalAlpha=0.5+0.3*Math.sin(b.anim*30);
    cx.strokeStyle='#ff5252'; cx.lineWidth=3;
    cx.beginPath(); cx.ellipse(mx,b.tgy,36,11,0,0,Math.PI*2); cx.stroke();
    cx.beginPath(); cx.ellipse(mx,b.tgy,16,5,0,0,Math.PI*2); cx.stroke();
    cx.restore();
  }
  cx.save();
  const ds=0.94*b.scale;
  cx.translate(sx,b.y-(b.airY||0)); cx.scale(b.facing*ds,ds);
  if(b.hurtT>0 && Math.floor(b.anim*28)%2===0) cx.filter='brightness(6)';
  if(b.state==='tele') cx.globalAlpha=0.45+0.3*Math.sin(b.anim*40);
  if(b.dead){
    cx.globalAlpha=clamp(b.deadT/60,0,1);
    cx.rotate(Math.PI/2*(1-clamp(b.deadT/130,0,1)));
  }

  // shadow stays on the ground while airborne
  const shScale=1-(b.airY||0)/420;
  cx.fillStyle='rgba(0,0,0,'+(0.32*shScale)+')';
  cx.save(); cx.translate(0,(b.airY||0)/ds);
  cx.beginPath(); cx.ellipse(0,6,26*shScale,6*shScale,0,0,Math.PI*2); cx.fill();
  cx.restore();

  const pose=bossPose(b);
  const wc=b.moving?Math.sin(b.anim*8):0, bob=wc*2;
  const flash=b.state==='windup'&&Math.floor(b.anim*20)%2===0;

  if(b.type==='captain') drawCaptainBody(b,wc,bob,pose.aA,pose.lift,flash);
  else if(b.type==='mech') drawMechBody(b,wc,bob,pose.aA,pose.lift,flash);
  else if(b.type==='overlord') drawOverlordBody(b,wc,bob,pose.aA,pose.lift,flash);
  else drawTitanBody(b,wc,bob,pose.aA,pose.lift,flash);

  cx.filter='none'; cx.globalAlpha=1; cx.restore();
}

function clawAt(fx,fy,r,col){
  cx.save(); cx.translate(fx,fy);
  cx.fillStyle=col;
  cx.beginPath();
  cx.moveTo(-r,-r*0.5); cx.lineTo(-r*0.4,r); cx.lineTo(0,-r*0.1);
  cx.lineTo(r*0.4,r); cx.lineTo(r,-r*0.5);
  cx.quadraticCurveTo(0,-r*1.1,-r,-r*0.5);
  cx.closePath(); cx.fill();
  cx.strokeStyle='#241200'; cx.lineWidth=2.2; cx.stroke();
  cx.restore();
}
function dizzyStars(hx,hy,anim){
  cx.fillStyle='#FFD700';
  for(let si=0;si<3;si++){
    const sa=(si/3)*Math.PI*2+anim*3;
    cx.beginPath(); cx.arc(hx+Math.cos(sa)*17,hy+Math.sin(sa)*8,2.6,0,Math.PI*2); cx.fill();
  }
}

// ── Boss shared pose ────────────────────────────────────
function bossArms(b,wc){
  let p={fa1:0.2+0.4*wc, fa2:0.45, ba1:-0.2-0.4*wc, ba2:0.45, drop:0};
  if(b.state==='windup'){
    const t=1-b.t/b.wuT;
    if(b.next==='slam'){ p.fa1=lerp(0.2,-2.5,t); p.fa2=-0.2; p.ba1=lerp(-0.2,-2.3,t); p.ba2=-0.2; }
    else if(b.next==='rocket'){ p.fa1=lerp(0.2,-1.8,t); p.fa2=-0.3; p.ba1=0.4; p.ba2=0.6; }
    else if(b.next==='jump'){ p.fa1=lerp(0.2,-0.8,t); p.ba1=lerp(-0.2,-0.8,t); p.drop=6*t; }
    else if(b.next==='volley'){ p.fa1=lerp(0.2,1.5,t); p.fa2=0; p.ba1=-0.4; p.ba2=0.5; }
    else { p.fa1=lerp(0.2,-1.3,t); p.fa2=-0.5; p.ba1=0.5; p.ba2=0.8; }
  } else if(b.state==='slam'){
    if(b.t>14){ p.fa1=-2.6; p.fa2=-0.1; p.ba1=-2.4; p.ba2=-0.1; }
    else { p.fa1=0.8; p.fa2=0.05; p.ba1=0.65; p.ba2=0.05; p.drop=8; }
  } else if(b.state==='dash'){
    p.fa1=1.5; p.fa2=0; p.ba1=1.25; p.ba2=0.1;
  } else if(b.state==='jump'){
    p.fa1=-2.4; p.fa2=-0.2; p.ba1=-2.2; p.ba2=-0.2;   // arms up, rising
  } else if(b.state==='dive'){
    p.fa1=0.9; p.fa2=0.1; p.ba1=0.7; p.ba2=0.1; p.drop=4;  // arms down, diving
  } else if(b.state==='rocket'){
    p.fa1=1.55; p.fa2=0; p.ba1=0.3; p.ba2=0.4;        // punch extended
  } else if(b.state==='volley'){
    p.fa1=1.5; p.fa2=0; p.ba1=-0.6; p.ba2=0.6;        // arm aimed forward
  } else if(b.state==='tele'){
    p.fa1=0.3; p.fa2=1.8; p.ba1=-0.3; p.ba2=1.8;      // cloaked pose
  } else if(b.state==='recover'){
    p.fa1=0.55; p.fa2=0.5; p.ba1=-0.4; p.ba2=0.4;
  }
  return p;
}

// ── HUD ────────────────────────────────────────────────
const STAGE_NAMES=['폐허의 도시','붉은 황무지','인류 최후의 기지'];
function drawHUD(p,score){
  // HP
  cx.fillStyle='rgba(0,0,0,0.55)'; rr(12,12,235,52,5);
  cx.fillStyle='#1a1a1a'; cx.fillRect(18,18,210,22);
  const hr=Math.max(0,p.hp/p.maxHp);
  const hg=cx.createLinearGradient(18,0,228,0);
  if(hr>0.5){hg.addColorStop(0,'#66BB6A');hg.addColorStop(1,'#43A047');}
  else if(hr>0.25){hg.addColorStop(0,'#FFA726');hg.addColorStop(1,'#FB8C00');}
  else{hg.addColorStop(0,'#EF5350');hg.addColorStop(1,'#C62828');}
  cx.fillStyle=hg; cx.fillRect(18,18,210*hr,22);
  cx.fillStyle='rgba(255,255,255,0.12)'; cx.fillRect(18,18,210*hr,8);
  cx.strokeStyle='#444'; cx.lineWidth=1; cx.strokeRect(18,18,210,22);
  cx.fillStyle='#fff'; cx.font='bold 11px Courier New'; cx.textAlign='left';
  cx.fillText('HP  '+Math.max(0,Math.round(p.hp))+' / '+p.maxHp, 24,33);
  // Level badge + EXP bar
  cx.fillStyle='#FFD54F'; cx.font='bold 12px Courier New'; cx.textAlign='right';
  cx.fillText('LV '+p.level, 224,32);
  cx.fillStyle='#15161a'; cx.fillRect(18,43,210,7);
  const er=clamp(p.exp/p.expNext,0,1);
  const eg=cx.createLinearGradient(18,0,228,0);
  eg.addColorStop(0,'#42A5F5'); eg.addColorStop(1,'#7C4DFF');
  cx.fillStyle=eg; cx.fillRect(18,43,210*er,7);
  cx.strokeStyle='#3a3d4a'; cx.lineWidth=1; cx.strokeRect(18,43,210,7);
  // Stage + progress bar
  const zi=camX+W/2>=Z2?2:camX+W/2>=Z1?1:0;
  cx.fillStyle='rgba(0,0,0,0.55)'; rr(W/2-110,12,220,50,5);
  cx.fillStyle='#aac4ff'; cx.font='bold 13px Courier New'; cx.textAlign='center';
  cx.fillText('STAGE '+(zi+1)+' - '+STAGE_NAMES[zi], W/2,30);
  const px0=W/2-95, pw=190;
  cx.fillStyle='#222'; cx.fillRect(px0,40,pw,6);
  cx.fillStyle='#FFD700';
  cx.fillRect(px0,40,pw*clamp(p.x/WORLD,0,1),6);
  // boss markers
  [3170,6520,9570,11900].forEach((bx,i)=>{
    const mx=px0+pw*bx/WORLD;
    cx.fillStyle=bossKilled[i]?'#445':'#ff4444';
    cx.beginPath(); cx.moveTo(mx,38); cx.lineTo(mx+4,43); cx.lineTo(mx,48); cx.lineTo(mx-4,43); cx.closePath(); cx.fill();
  });
  const mpx=px0+pw*clamp(p.x/WORLD,0,1);
  cx.fillStyle='#FFD700'; cx.beginPath(); cx.arc(mpx,43,4,0,Math.PI*2); cx.fill();
  // Score
  cx.fillStyle='rgba(0,0,0,0.55)'; rr(W-178,12,166,46,5);
  cx.fillStyle='#ffd700'; cx.font='bold 11px Courier New'; cx.textAlign='right';
  cx.fillText('SCORE', W-20,30); cx.font='bold 20px Courier New';
  cx.fillText(String(score).padStart(6,'0'), W-20,48);
  // Combo gauge
  if(p.comboTimer>0){
    const cp=p.comboTimer/70;
    cx.fillStyle='rgba(0,0,0,0.5)'; cx.fillRect(18,62,100,8);
    const cg=cx.createLinearGradient(18,0,118,0);
    cg.addColorStop(0,'#e040fb'); cg.addColorStop(1,'#ff80ff');
    cx.fillStyle=cg; cx.fillRect(18,62,100*cp,8);
    cx.fillStyle='#f0f'; cx.font='bold 10px Courier New'; cx.textAlign='left';
    cx.shadowColor='#f0f'; cx.shadowBlur=5;
    cx.fillText('A 콤보!',126,70); cx.shadowBlur=0;
  }
  // tornado cooldown gauge
  if(p.spinCool>0){
    const sp=1-p.spinCool/200;
    cx.fillStyle='rgba(0,0,0,0.5)'; cx.fillRect(18,74,100,8);
    cx.fillStyle=sp>=1?'#4DD0E1':'#26737e'; cx.fillRect(18,74,100*sp,8);
    cx.fillStyle='#9be7ff'; cx.font='bold 10px Courier New'; cx.textAlign='left';
    cx.fillText('D 회오리',126,82);
  }
  // energy ball cooldown gauge
  if(p.shotCool>0&&p.ammo<=0){
    const sp=1-p.shotCool/75;
    cx.fillStyle='rgba(0,0,0,0.5)'; cx.fillRect(18,86,100,8);
    cx.fillStyle='#8e5aa8'; cx.fillRect(18,86,100*sp,8);
    cx.fillStyle='#E1BEE7'; cx.font='bold 10px Courier New'; cx.textAlign='left';
    cx.fillText('F 에너지볼',126,94);
  }
  // ray gun ammo
  if(p.ammo>0){
    cx.fillStyle='rgba(0,0,0,0.55)'; rr(12,104,98,22,5);
    cx.save(); cx.translate(28,115); cx.lineJoin='round';
    cx.fillStyle='#cfd5e2'; rr(-8,-3.5,13,6,2);
    cx.strokeStyle='#241200'; cx.lineWidth=1.6; cx.stroke();
    cx.fillStyle='#FFEB3B'; cx.beginPath(); cx.arc(7,-0.5,3,0,Math.PI*2); cx.fill();
    cx.restore();
    cx.fillStyle='#FFEB3B'; cx.font='bold 13px Courier New'; cx.textAlign='left';
    cx.fillText('x '+p.ammo, 44,120);
  }
  cx.textAlign='left';
  // Boss HP bar
  if(boss){
    const bw2=420, bx2=W/2-bw2/2, by2=H-44;
    cx.fillStyle='rgba(0,0,0,0.6)'; rr(bx2-8,by2-20,bw2+16,42,6);
    cx.fillStyle='#ff5555'; cx.font='bold 12px Courier New'; cx.textAlign='center';
    cx.fillText(boss.name, W/2, by2-6);
    cx.fillStyle='#1a1a1a'; cx.fillRect(bx2,by2,bw2,12);
    const bhr=Math.max(0,boss.hp/boss.maxHp);
    const bg2=cx.createLinearGradient(bx2,0,bx2+bw2,0);
    bg2.addColorStop(0,'#ff1744'); bg2.addColorStop(1,'#ff6f00');
    cx.fillStyle=bg2; cx.fillRect(bx2,by2,bw2*bhr,12);
    cx.strokeStyle='#666'; cx.strokeRect(bx2,by2,bw2,12);
    cx.textAlign='left';
  }
  // GO arrow
  if(lock==null && !boss && encIdx<ENC.length && scene===SC.PLAY){
    if(Math.floor(gTime*2)%2===0){
      cx.save(); cx.textAlign='right';
      cx.fillStyle='#FFD700'; cx.font='bold 30px Courier New';
      cx.shadowColor='#FFD700'; cx.shadowBlur=12;
      cx.fillText('GO →', W-26, H/2-30);
      cx.restore(); cx.textAlign='left';
    }
  }
}

// ── Banner (stage / boss announcements) ─────────────────
let banner=null;
function showBanner(text,sub,col='#FFD700',dur=170){ banner={text,sub,col,t:dur,dur}; }
function drawBanner(){
  if(!banner)return;
  banner.t--;
  if(banner.t<=0){banner=null;return;}
  const p=banner.t/banner.dur;
  const a=p>0.85?(1-p)/0.15:p<0.2?p/0.2:1;
  cx.save(); cx.globalAlpha=a;
  cx.fillStyle='rgba(0,0,0,0.45)'; cx.fillRect(0,H/2-58,W,96);
  cx.strokeStyle=banner.col; cx.lineWidth=2; cx.globalAlpha=a*0.6;
  cx.beginPath(); cx.moveTo(0,H/2-58); cx.lineTo(W,H/2-58); cx.stroke();
  cx.beginPath(); cx.moveTo(0,H/2+38); cx.lineTo(W,H/2+38); cx.stroke();
  cx.globalAlpha=a;
  cx.textAlign='center';
  cx.shadowColor=banner.col; cx.shadowBlur=18;
  cx.fillStyle=banner.col; cx.font='bold 32px Courier New';
  cx.fillText(banner.text, W/2, H/2-12);
  cx.shadowBlur=0;
  if(banner.sub){
    cx.fillStyle='#ddd'; cx.font='15px Courier New';
    cx.fillText(banner.sub, W/2, H/2+20);
  }
  cx.restore(); cx.textAlign='left';
}

function mobs(type,n,t2,n2){
  const list=[];
  for(let i=0;i<n;i++) list.push({type,delay:i*48});
  if(t2) for(let i=0;i<n2;i++) list.push({type:t2,delay:60+i*48});
  return list;
}

// ── Encounter flow ──────────────────────────────────────
function startEncounter(e){
  if(e.boss){
    // boss fights still lock the camera
    lock=e.cam;
    boss=mkBoss(e.boss);
    const d=BOSS_DEF[e.boss];
    showBanner('!! '+d.name+' !!', d.sub, '#ff4444', 200);
    doShake(5,16);
  } else {
    // mobs spawn and give chase — the road stays open
    e.spawn.forEach((s,i)=>{
      SQ.push({t:s.delay, type:s.type, side:i%2===0?'R':'L'});
    });
    encIdx++;
  }
}
function encounterCleared(){
  if(SQ.length>0)return false;
  if(boss)return false;
  return enemies.every(e=>e.dead);
}
function finishEncounter(){
  minCam=lock; lock=null; encIdx++;
}

function damagePlayer(d){
  if(player.inv>0||scene!==SC.PLAY)return;
  // tornado spin deflects all incoming attacks
  if(player.attacking&&player.atkType===6)return;
  player.hp-=d; player.hurtTimer=22; player.inv=52;
  htAdd(player.x,player.y-132,'-'+d,'#FF3300');
  pAdd(player.x,player.y-45,8,'#FF0000'); doShake(5,7);
}

function hitEnemy(e,dmg,atkT,dir){
  dir=dir||player.facing;
  e.hp-=dmg; e.hurtTimer=16; score+=dmg;
  // getting hit cancels ranged/special attacks
  e.shootT=0; e.dashT=0; e.meleeT=0;
  if(e.state==='shoot'||e.state==='dash'||e.state==='dashwind')e.state='hurt';
  const ws=['HIT!','POW!','BAM!','SMASH!','WHAM!','CRACK!'];
  htAdd(e.x,e.y-65,ws[Math.floor(Math.random()*ws.length)],'#FFD700');
  pAdd(e.x,e.y-35,8,'#FF9800');
  const knock={2:2,3:3,5:2.4,6:2.2,8:2.6,9:3.0}[atkT]||0;
  if(knock>0){
    e.isFlying=true; e.flyVx=dir*(3.5+knock*1.5);
    e.flyVy=-(2.5+knock); e.flyAng=0; e.flyAngV=(Math.random()-0.5)*0.38; e.groundY=e.y;
    doShake(knock*2.8,7); pAdd(e.x,e.y-30,20,'#FFA000',1.6);
    if(atkT===3) pAdd(e.x,e.y-30,14,'#CE93D8',1.8);
    if(atkT===6) pAdd(e.x,e.y-30,12,'#4DD0E1',1.6);
  } else { e.x+=dir*16; doShake(3,3); }
  if(e.hp<=0&&!e.dead) killEnemy(e);
}

function gainExp(n){
  const p=player;
  p.exp+=n;
  while(p.exp>=p.expNext){
    p.exp-=p.expNext;
    p.level++;
    p.expNext=Math.round(p.expNext*1.35);
    p.maxHp+=24; p.hp=p.maxHp;          // level up fully heals
    p.pwr=1+(p.level-1)*0.07;            // +7% damage per level
    htAdd(p.x,p.y-150,'LEVEL UP!','#FFD54F');
    pAdd(p.x,p.y-50,26,'#FFD54F',1.8); pAdd(p.x,p.y-50,18,'#7C4DFF',1.5);
    doShake(4,8);
    showBanner('LEVEL '+p.level+' 달성!','체력 회복 · 공격력 상승!','#FFD54F',120);
  }
}

function killEnemy(e){
  e.dead=true; e.state='dead'; e.isFlying=false; e.deadTimer=150;
  score+=e.scoreV; gainExp(Math.round(e.scoreV*0.12));
  pAdd(e.x,e.y-20,25,'#FF4400',2.2); htAdd(e.x,e.y-82,'KO!!','#FF4400');
  dropItem(e.x,e.y);
}

function updateItems(){

}
